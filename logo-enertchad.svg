<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gold ring gradient -->
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C667"/>
      <stop offset="30%" stop-color="#D4A843"/>
      <stop offset="60%" stop-color="#C49A35"/>
      <stop offset="100%" stop-color="#E8C667"/>
    </linearGradient>
    <!-- Gold petal (top) -->
    <radialGradient id="goldPetal" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#E8D06A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </radialGradient>
    <!-- Blue petal (left) -->
    <radialGradient id="bluePetal" cx="0.6" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#4A8FD9"/>
      <stop offset="50%" stop-color="#2E6BBF"/>
      <stop offset="100%" stop-color="#1A4F9A"/>
    </radialGradient>
    <!-- Green petal (right) -->
    <radialGradient id="greenPetal" cx="0.4" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#2DAF50"/>
      <stop offset="50%" stop-color="#1B8C3D"/>
      <stop offset="100%" stop-color="#126B2C"/>
    </radialGradient>
    <!-- Cream petal (bottom) -->
    <radialGradient id="creamPetal" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#F0E4C4"/>
      <stop offset="50%" stop-color="#E0D0A0"/>
      <stop offset="100%" stop-color="#CCBB85"/>
    </radialGradient>
    <!-- Subtle shadow -->
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- White circle background -->
  <circle cx="100" cy="100" r="78" fill="#FAFAF5"/>
  
  <!-- Gold ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#goldRing)" stroke-width="5"/>
  <circle cx="100" cy="100" r="82.5" fill="none" stroke="rgba(232,198,103,0.3)" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="77.5" fill="none" stroke="rgba(232,198,103,0.3)" stroke-width="0.5"/>

  <!-- 4 Petals/Drops - arranged as a clover -->
  <g filter="url(#dropShadow)">
    <!-- Top petal (Gold) - drop pointing up -->
    <path d="M100 42 C108 58, 128 70, 128 85 C128 100, 115 108, 100 108 C85 108, 72 100, 72 85 C72 70, 92 58, 100 42Z" fill="url(#goldPetal)"/>
    
    <!-- Left petal (Blue) - drop pointing left -->
    <path d="M42 100 C58 92, 70 72, 85 72 C100 72, 108 85, 108 100 C108 115, 100 128, 85 128 C70 128, 58 108, 42 100Z" fill="url(#bluePetal)"/>
    
    <!-- Right petal (Green) - drop pointing right -->
    <path d="M158 100 C142 108, 130 128, 115 128 C100 128, 92 115, 92 100 C92 85, 100 72, 115 72 C130 72, 142 92, 158 100Z" fill="url(#greenPetal)"/>
    
    <!-- Bottom petal (Cream) - drop pointing down -->
    <path d="M100 158 C92 142, 72 130, 72 115 C72 100, 85 92, 100 92 C115 92, 128 100, 128 115 C128 130, 108 142, 100 158Z" fill="url(#creamPetal)"/>
  </g>

  <!-- Center highlight -->
  <circle cx="100" cy="100" r="6" fill="rgba(255,255,255,0.3)"/>
</svg>
