<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-2px); } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .float { animation: float 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#080E1A"/>

  <!-- Circuit Board Pattern -->
  <g opacity="0.6">
    <!-- Main traces -->
    <line x1="30" y1="50" x2="80" y2="50" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="50" x2="80" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="100" x2="170" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="170" y1="100" x2="170" y2="50" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="170" y1="50" x2="120" y2="50" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>

    <!-- Connection pads -->
    <circle cx="30" cy="50" r="2.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="80" cy="50" r="2.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="80" cy="100" r="2.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="170" cy="100" r="2.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="170" cy="50" r="2.5" fill="#8B5CF6" opacity="0.7"/>
  </g>

  <!-- Microchip Icon -->
  <g class="pulse">
    <!-- Chip body -->
    <rect x="75" y="60" width="50" height="50" fill="rgba(139, 92, 246, 0.15)" stroke="#8B5CF6" stroke-width="2" rx="4" opacity="0.9"/>

    <!-- Inner core -->
    <rect x="85" y="70" width="30" height="30" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>

    <!-- Central grid -->
    <line x1="90" y1="70" x2="90" y2="100" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="100" y1="70" x2="100" y2="100" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="110" y1="70" x2="110" y2="100" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>

    <line x1="85" y1="80" x2="115" y2="80" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="85" y1="90" x2="115" y2="90" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>

    <!-- Pin connectors -->
    <line x1="75" y1="75" x2="68" y2="75" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
    <line x1="75" y1="105" x2="68" y2="105" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
    <line x1="125" y1="75" x2="132" y2="75" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
    <line x1="125" y1="105" x2="132" y2="105" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Data Nodes/Connections -->
  <g class="float">
    <!-- Top node -->
    <circle cx="50" cy="35" r="3" fill="#8B5CF6" opacity="0.8"/>
    <line x1="50" y1="38" x2="50" y2="55" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>

    <!-- Left node -->
    <circle cx="30" cy="75" r="3" fill="#8B5CF6" opacity="0.8"/>
    <line x1="33" y1="75" x2="70" y2="75" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>

    <!-- Right node -->
    <circle cx="170" cy="75" r="3" fill="#8B5CF6" opacity="0.8"/>
    <line x1="167" y1="75" x2="130" y2="75" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>

    <!-- Bottom node -->
    <circle cx="100" cy="125" r="3" fill="#8B5CF6" opacity="0.8"/>
    <line x1="100" y1="122" x2="100" y2="110" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Accent glow -->
  <circle cx="100" cy="85" r="35" fill="rgba(139, 92, 246, 0.1)" opacity="0.5"/>
</svg>