<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#080E1A"/>

  <!-- Oil Derrick -->
  <g class="pulse">
    <!-- Main mast -->
    <line x1="100" y1="20" x2="100" y2="95" stroke="#2E86DE" stroke-width="2.5" opacity="0.9"/>

    <!-- Support left -->
    <line x1="100" y1="35" x2="75" y2="55" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="55" x2="75" y2="75" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>

    <!-- Support right -->
    <line x1="100" y1="35" x2="125" y2="55" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="55" x2="125" y2="75" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>

    <!-- Cross brace -->
    <line x1="75" y1="55" x2="125" y2="55" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>

    <!-- Top cap -->
    <circle cx="100" cy="20" r="5" fill="#2E86DE" opacity="0.8"/>

    <!-- Base -->
    <rect x="95" y="95" width="10" height="8" fill="#2E86DE" opacity="0.7"/>
  </g>

  <!-- Geological Layers -->
  <g opacity="0.6">
    <!-- Layer 1 -->
    <rect x="40" y="110" width="120" height="8" fill="rgba(46, 134, 222, 0.15)" stroke="#2E86DE" stroke-width="0.5"/>

    <!-- Layer 2 -->
    <rect x="35" y="122" width="130" height="7" fill="rgba(46, 134, 222, 0.1)" stroke="#2E86DE" stroke-width="0.5"/>

    <!-- Layer 3 -->
    <rect x="30" y="133" width="140" height="6" fill="rgba(46, 134, 222, 0.08)" stroke="#2E86DE" stroke-width="0.5"/>

    <!-- Soil particles -->
    <circle cx="50" cy="115" r="1.5" fill="#2E86DE" opacity="0.5"/>
    <circle cx="80" cy="128" r="1" fill="#2E86DE" opacity="0.4"/>
    <circle cx="120" cy="138" r="1.5" fill="#2E86DE" opacity="0.4"/>
  </g>

  <!-- Drill Bit -->
  <g opacity="0.8">
    <!-- Drill connection -->
    <line x1="100" y1="95" x2="100" y2="108" stroke="#D9A84F" stroke-width="1.5" opacity="0.7"/>

    <!-- Bit cone -->
    <polygon points="100,108 95,118 105,118" fill="#D9A84F" opacity="0.7"/>

    <!-- Cutting edges -->
    <line x1="96" y1="115" x2="93" y2="120" stroke="#D9A84F" stroke-width="0.5" opacity="0.6"/>
    <line x1="104" y1="115" x2="107" y2="120" stroke="#D9A84F" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Accent glow -->
  <g opacity="0.4">
    <circle cx="100" cy="60" r="35" fill="rgba(46, 134, 222, 0.15)"/>
  </g>
</svg>