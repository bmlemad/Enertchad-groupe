<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#080E1A"/>

  <!-- Subtle gradient glow -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:rgba(217,168,79,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(217,168,79,0.01);stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D9A84F;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#D9A84F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D9A84F;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Glow overlay -->
  <rect width="1200" height="630" fill="url(#glowGradient)"/>

  <!-- Top accent line -->
  <rect x="0" y="120" width="1200" height="2" fill="url(#goldAccent)" opacity="0.6"/>

  <!-- Gold accent vertical lines -->
  <line x1="200" y1="140" x2="200" y2="490" stroke="#D9A84F" stroke-width="1" opacity="0.15"/>
  <line x1="1000" y1="140" x2="1000" y2="490" stroke="#D9A84F" stroke-width="1" opacity="0.15"/>

  <!-- Main text: EnerTchad logo -->
  <text x="600" y="280" font-family="Space Grotesk, system-ui, sans-serif" font-size="90" font-weight="700" fill="#D9A84F" text-anchor="middle" letter-spacing="-2">
    EnerTchad
  </text>

  <!-- Tagline below -->
  <text x="600" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">
    Champion National de l'Énergie
  </text>

  <!-- Country: Tchad -->
  <text x="600" y="410" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="#E2E8F0" text-anchor="middle" letter-spacing="0.3" opacity="0.85">
    Tchad
  </text>

  <!-- Subtle decorative dots -->
  <circle cx="300" cy="150" r="2" fill="#D9A84F" opacity="0.4"/>
  <circle cx="900" cy="150" r="2" fill="#D9A84F" opacity="0.4"/>
  <circle cx="250" cy="480" r="2" fill="#D9A84F" opacity="0.4"/>
  <circle cx="950" cy="480" r="2" fill="#D9A84F" opacity="0.4"/>

  <!-- Bottom accent line -->
  <rect x="0" y="508" width="1200" height="1" fill="url(#goldAccent)" opacity="0.4"/>
</svg>