<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Workover units - Crane and hoist">
  <defs>
    <linearGradient id="grad_fleet2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_fleet2" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1.5" fill="#2E86DE" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_fleet2)"/>
  <rect width="800" height="450" fill="url(#dots_fleet2)"/>
  
  <!-- Crane boom center-left -->
  <g transform="translate(150, 100)">
    <!-- Vertical mast -->
    <line x1="40" y1="0" x2="40" y2="120" stroke="#C8962E" stroke-width="3" opacity="0.85"/>
    
    <!-- Boom arm (angled) -->
    <line x1="40" y1="20" x2="150" y2="80" stroke="#2E86DE" stroke-width="3" opacity="0.8"/>
    
    <!-- Boom supports -->
    <line x1="40" y1="40" x2="130" y2="70" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Hook and cable -->
    <line x1="150" y1="80" x2="150" y2="140" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <circle cx="150" cy="145" r="7" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    
    <!-- Base -->
    <rect x="10" y="120" width="60" height="15" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Well intervention tools right side -->
  <g transform="translate(520, 110)">
    <!-- Tool 1: Tubing elevator -->
    <rect x="0" y="0" width="50" height="40" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <path d="M 10 5 L 40 5 M 10 20 L 40 20 M 10 35 L 40 35" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="25" y="50" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">ELEVATOR</text>
    
    <!-- Tool 2: Slips -->
    <rect x="70" y="0" width="50" height="40" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <path d="M 85 10 L 95 25 L 85 40 M 105 10 L 115 25 L 105 40" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <text x="95" y="50" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">SLIPS</text>
  </g>
  
  <!-- Load monitoring -->
  <g transform="translate(350, 300)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.8">Load Capacity:</text>
    <rect x="0" y="12" width="150" height="10" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <rect x="0" y="12" width="105" height="10" fill="#C8962E" opacity="0.5"/>
    <text x="160" y="20" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.6">350 tons</text>
  </g>
  
  <g transform="translate(100, 300)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.8">Hoist Speed:</text>
    <circle cx="50" cy="20" r="12" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="10" x2="50" y2="20" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <text x="70" y="24" font-family="monospace" font-size="10" fill="#2E86DE" opacity="0.6">45 m/min</text>
  </g>
</svg>
