<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pétrochimie - Lab flask">
  <defs>
    <linearGradient id="grad_op06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_op06" width="35" height="35" patternUnits="userSpaceOnUse">
      <circle cx="17.5" cy="17.5" r="1.2" fill="#2E86DE" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op06)"/>
  <rect width="800" height="450" fill="url(#dots_op06)"/>
  
  <!-- Lab flask left -->
  <g transform="translate(130, 100)">
    <!-- Flask body -->
    <path d="M 30 20 L 20 80 Q 20 110 40 120 Q 60 110 60 80 L 50 20 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <!-- Liquid inside -->
    <path d="M 22 95 Q 22 110 40 118 Q 58 110 58 95 Z" fill="#2E86DE" opacity="0.4"/>
    <!-- Stopper -->
    <rect x="33" y="0" width="14" height="20" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <!-- Graduation marks -->
    <line x1="15" y1="50" x2="20" y2="50" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="70" x2="20" y2="70" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="90" x2="20" y2="90" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Molecular bonds center -->
  <g transform="translate(350, 120)">
    <!-- Central atom -->
    <circle cx="0" cy="0" r="5" fill="#C8962E" opacity="0.8"/>
    
    <!-- Connected atoms -->
    <circle cx="50" cy="0" r="4" fill="#2E86DE" opacity="0.8"/>
    <circle cx="-50" cy="0" r="4" fill="#2E86DE" opacity="0.8"/>
    <circle cx="0" cy="50" r="4" fill="#2E86DE" opacity="0.8"/>
    <circle cx="0" cy="-50" r="4" fill="#2E86DE" opacity="0.8"/>
    
    <!-- Bonds -->
    <line x1="0" y1="0" x2="50" y2="0" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="-50" y2="0" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    
    <!-- Double bonds indication -->
    <line x1="35" y1="-8" x2="35" y2="8" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="-35" y1="-8" x2="-35" y2="8" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Chemical process columns right -->
  <g transform="translate(570, 80)">
    <!-- Column 1 -->
    <rect x="0" y="0" width="35" height="150" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="50" x2="35" y2="50" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="100" x2="35" y2="100" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <circle cx="17.5" cy="25" r="3" fill="#C8962E" opacity="0.7"/>
    <circle cx="17.5" cy="75" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="17.5" cy="125" r="3" fill="#C8962E" opacity="0.7"/>
    
    <!-- Column 2 -->
    <rect x="50" y="0" width="35" height="150" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="50" y1="40" x2="85" y2="40" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="80" x2="85" y2="80" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="110" x2="85" y2="110" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <circle cx="67.5" cy="20" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="67.5" cy="60" r="3" fill="#C8962E" opacity="0.7"/>
    <circle cx="67.5" cy="130" r="3" fill="#2E86DE" opacity="0.7"/>
    
    <!-- Connection pipes -->
    <path d="M 35 30 Q 42 30 50 40" stroke="#C8962E" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 35 75 Q 42 75 50 80" stroke="#2E86DE" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
</svg>
