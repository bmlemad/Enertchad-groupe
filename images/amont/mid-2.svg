<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Storage tanks - Tank farm">
  <defs>
    <linearGradient id="grad_mid2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_mid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#2E86DE" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_mid2)"/>
  <rect width="800" height="450" fill="url(#dots_mid2)"/>
  
  <!-- Tank farm aerial view -->
  <!-- Tank 1 (large) -->
  <g transform="translate(120, 100)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <!-- Interior level marking -->
    <path d="M -40 -10 Q 0 -8 40 -10" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <!-- Top access -->
    <circle cx="0" cy="-50" r="4" fill="#C8962E" opacity="0.7"/>
    <!-- Valve -->
    <circle cx="0" cy="50" r="4" fill="#2E86DE" opacity="0.6"/>
    <!-- Volume indicator -->
    <text x="0" y="5" font-family="monospace" font-size="11" fill="#C8962E" text-anchor="middle" opacity="0.7" font-weight="bold">5M BBL</text>
  </g>
  
  <!-- Tank 2 (medium) -->
  <g transform="translate(320, 80)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <path d="M -30 0 Q 0 2 30 0" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-40" r="4" fill="#C8962E" opacity="0.7"/>
    <circle cx="0" cy="40" r="4" fill="#C8962E" opacity="0.6"/>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#2E86DE" text-anchor="middle" opacity="0.7" font-weight="bold">3M BBL</text>
  </g>
  
  <!-- Tank 3 (medium) -->
  <g transform="translate(530, 120)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <path d="M -30 -5 Q 0 -3 30 -5" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-40" r="4" fill="#C8962E" opacity="0.7"/>
    <circle cx="0" cy="40" r="4" fill="#2E86DE" opacity="0.6"/>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#C8962E" text-anchor="middle" opacity="0.7" font-weight="bold">3M BBL</text>
  </g>
  
  <!-- Tank 4 (small) -->
  <g transform="translate(700, 90)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
    <path d="M -20 5 Q 0 7 20 5" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="-32" r="3" fill="#C8962E" opacity="0.7"/>
    <circle cx="0" cy="32" r="3" fill="#C8962E" opacity="0.6"/>
    <text x="0" y="5" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">1.5M BBL</text>
  </g>
  
  <!-- Interconnecting pipelines -->
  <defs>
    <marker id="arrow_mid2" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8962E"/>
    </marker>
  </defs>
  <path d="M 170 100 L 280 100" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_mid2)" opacity="0.6"/>
  <path d="M 360 100 L 490 100" stroke="#2E86DE" stroke-width="2" fill="none" marker-end="url(#arrow_mid2)" opacity="0.6"/>
  <path d="M 570 120 L 668 110" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_mid2)" opacity="0.6"/>
  
  <!-- Total capacity indicator -->
  <g transform="translate(300, 310)">
    <text x="0" y="0" font-family="monospace" font-size="13" fill="#C8962E" opacity="0.85" font-weight="bold">Total Capacity: 12.5 Million Barrels</text>
    <rect x="0" y="15" width="300" height="12" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <rect x="0" y="15" width="255" height="12" fill="#C8962E" opacity="0.5"/>
    <text x="310" y="23" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.6">85% full</text>
  </g>
</svg>
