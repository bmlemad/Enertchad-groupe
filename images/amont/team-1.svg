<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CEO - Directeur Général">
  <defs>
    <linearGradient id="grad_team1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_team1" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#C8962E" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_team1)"/>
  <rect width="800" height="450" fill="url(#grid_team1)"/>
  
  <!-- Executive desk left -->
  <g transform="translate(80, 120)">
    <!-- Desk surface -->
    <rect x="0" y="0" width="120" height="70" fill="none" stroke="#C8962E" stroke-width="3" opacity="0.8"/>
    <!-- Desk legs -->
    <line x1="20" y1="70" x2="20" y2="95" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="100" y1="70" x2="100" y2="95" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <!-- Gold accent -->
    <rect x="10" y="10" width="100" height="8" fill="#C8962E" opacity="0.5"/>
    <!-- Items on desk -->
    <circle cx="30" cy="40" r="6" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <rect x="55" y="35" width="25" height="15" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Leadership star center-top -->
  <g transform="translate(400, 80)">
    <polygon points="0,-40 10,-15 40,-15 20,5 30,35 0,15 -30,35 -20,5 -40,-15 -10,-15" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="8" fill="#C8962E" opacity="0.7"/>
  </g>
  
  <!-- Chad map outline right -->
  <g transform="translate(580, 120)">
    <!-- Simplified Chad map boundary -->
    <path d="M 0 60 Q 15 40 25 20 Q 30 10 35 5 Q 40 20 45 40 Q 50 60 48 80 Q 40 95 20 100 Q 5 90 0 60 Z" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <!-- Capital marker -->
    <circle cx="20" cy="60" r="4" fill="#C8962E" opacity="0.85"/>
    <!-- Field markers -->
    <circle cx="35" cy="35" r="2.5" fill="#2E86DE" opacity="0.7"/>
    <circle cx="30" cy="70" r="2.5" fill="#2E86DE" opacity="0.7"/>
    <circle cx="15" cy="80" r="2.5" fill="#C8962E" opacity="0.6"/>
  </g>
  
  <!-- Leadership indicators bottom -->
  <g transform="translate(150, 310)">
    <rect x="0" y="0" width="180" height="12" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <text x="190" y="9" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.7">Strategic Vision</text>
  </g>
  
  <g transform="translate(450, 310)">
    <rect x="0" y="0" width="180" height="12" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <text x="190" y="9" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.7">Board Management</text>
  </g>
</svg>
