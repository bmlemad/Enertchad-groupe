<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Champ numérique et cybersécurité - Digital oilfield">
  <defs>
    <linearGradient id="grad_op04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op04)"/>

  <!-- Hexagonal network — dominant motif -->
  <g transform="translate(400, 200)" opacity="0.8">
    <!-- Central hex -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.7"/>
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.4"/>
    <!-- Shield icon center -->
    <path d="M 0 -18 L 14 -8 L 12 12 Q 0 20 0 20 Q -12 12 -14 -8 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <path d="M -4 2 L 0 8 L 8 -6" stroke="#C8962E" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Surrounding hexes — ring 1 -->
    <!-- Top -->
    <polygon points="0,-160 32,-145 32,-115 0,-100 -32,-115 -32,-145" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-130" r="5" fill="#2E86DE" opacity="0.5"/>
    <!-- Top-right -->
    <polygon points="90,-100 122,-85 122,-55 90,-40 58,-55 58,-85" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <circle cx="90" cy="-70" r="5" fill="#C8962E" opacity="0.5"/>
    <!-- Bottom-right -->
    <polygon points="90,40 122,55 122,85 90,100 58,85 58,55" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <circle cx="90" cy="70" r="5" fill="#2E86DE" opacity="0.5"/>
    <!-- Bottom -->
    <polygon points="0,100 32,115 32,145 0,160 -32,145 -32,115" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="130" r="5" fill="#C8962E" opacity="0.5"/>
    <!-- Bottom-left -->
    <polygon points="-90,40 -58,55 -58,85 -90,100 -122,85 -122,55" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-90" cy="70" r="5" fill="#2E86DE" opacity="0.5"/>
    <!-- Top-left -->
    <polygon points="-90,-100 -58,-85 -58,-55 -90,-40 -122,-55 -122,-85" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-90" cy="-70" r="5" fill="#C8962E" opacity="0.5"/>

    <!-- Connection lines from center to surrounding -->
    <line x1="0" y1="-60" x2="0" y2="-100" stroke="#2E86DE" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <line x1="52" y1="-30" x2="58" y2="-55" stroke="#C8962E" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <line x1="52" y1="30" x2="58" y2="55" stroke="#2E86DE" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <line x1="0" y1="60" x2="0" y2="100" stroke="#C8962E" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <line x1="-52" y1="30" x2="-58" y2="55" stroke="#2E86DE" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    <line x1="-52" y1="-30" x2="-58" y2="-55" stroke="#C8962E" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  </g>

  <!-- Binary data streams — left edge -->
  <g transform="translate(30, 50)" opacity="0.3">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#2E86DE">01101001</text>
    <text x="0" y="14" font-family="monospace" font-size="9" fill="#C8962E">10010110</text>
    <text x="0" y="28" font-family="monospace" font-size="9" fill="#2E86DE">11001010</text>
    <text x="0" y="42" font-family="monospace" font-size="9" fill="#2E86DE">00110101</text>
    <text x="0" y="56" font-family="monospace" font-size="9" fill="#C8962E">10101100</text>
    <text x="0" y="70" font-family="monospace" font-size="9" fill="#2E86DE">01010011</text>
  </g>

  <!-- Binary data streams — right edge -->
  <g transform="translate(720, 280)" opacity="0.3">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#C8962E">11010010</text>
    <text x="0" y="14" font-family="monospace" font-size="9" fill="#2E86DE">01001101</text>
    <text x="0" y="28" font-family="monospace" font-size="9" fill="#C8962E">10110010</text>
    <text x="0" y="42" font-family="monospace" font-size="9" fill="#2E86DE">01101011</text>
    <text x="0" y="56" font-family="monospace" font-size="9" fill="#C8962E">11001001</text>
  </g>

  <!-- Pulse/radar rings emanating from center -->
  <circle cx="400" cy="200" r="200" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.1"/>
  <circle cx="400" cy="200" r="250" fill="none" stroke="#C8962E" stroke-width="0.6" opacity="0.07"/>
  <circle cx="400" cy="200" r="300" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.05"/>
</svg>
