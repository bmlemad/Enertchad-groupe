<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CTO - Directeur Technique">
  <defs>
    <linearGradient id="grad_team3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="circuit" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="30" height="30" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_team3)"/>
  <rect width="800" height="450" fill="url(#circuit)"/>
  
  <!-- Digital circuit board left -->
  <g transform="translate(80, 100)">
    <!-- Main circuit paths -->
    <path d="M 20 30 L 80 30 L 80 90 L 20 90 L 20 30" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <line x1="30" y1="30" x2="30" y2="90" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="30" x2="50" y2="90" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="30" x2="70" y2="90" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    
    <!-- Connection nodes -->
    <circle cx="20" cy="60" r="3" fill="#C8962E" opacity="0.8"/>
    <circle cx="30" cy="45" r="2.5" fill="#2E86DE" opacity="0.7"/>
    <circle cx="50" cy="60" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="70" cy="50" r="2.5" fill="#2E86DE" opacity="0.7"/>
    <circle cx="80" cy="75" r="3" fill="#C8962E" opacity="0.8"/>
  </g>
  
  <!-- Central processor/innovation hub -->
  <g transform="translate(350, 120)">
    <!-- Core processor -->
    <rect x="30" y="30" width="40" height="40" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <line x1="40" y1="30" x2="40" y2="70" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="30" x2="60" y2="70" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="45" x2="70" y2="45" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="55" x2="70" y2="55" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    
    <!-- Radiating innovation lines -->
    <line x1="50" y1="30" x2="50" y2="0" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="70" y1="50" x2="100" y2="50" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="70" x2="50" y2="100" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="50" x2="0" y2="50" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    
    <!-- Connection points -->
    <circle cx="50" cy="0" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="100" cy="50" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="50" cy="100" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="0" cy="50" r="3" fill="#2E86DE" opacity="0.7"/>
  </g>
  
  <!-- IoT/sensors cluster right -->
  <g transform="translate(580, 120)">
    <!-- Device network -->
    <circle cx="30" cy="30" r="4" fill="#C8962E" opacity="0.8"/>
    <circle cx="70" cy="30" r="4" fill="#2E86DE" opacity="0.8"/>
    <circle cx="50" cy="70" r="4" fill="#C8962E" opacity="0.8"/>
    <circle cx="30" cy="70" r="3" fill="#2E86DE" opacity="0.7"/>
    <circle cx="70" cy="70" r="3" fill="#2E86DE" opacity="0.7"/>
    
    <!-- Network connections -->
    <line x1="30" y1="30" x2="70" y2="30" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="30" x2="50" y2="70" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="30" x2="50" y2="70" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="70" x2="50" y2="70" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="70" x2="70" y2="70" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
