<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interventions et stimulation - Wireline tools">
  <defs>
    <linearGradient id="grad_op03" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="wave_op03" width="60" height="30" patternUnits="userSpaceOnUse">
      <path d="M 0 15 Q 15 0 30 15 Q 45 30 60 15" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op03)"/>
  <rect width="800" height="450" fill="url(#wave_op03)"/>

  <!-- Well casing — left side, tall vertical -->
  <g transform="translate(200, 40)">
    <rect x="-25" y="0" width="50" height="380" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.5"/>

    <!-- Wireline cable descending -->
    <line x1="0" y1="-20" x2="0" y2="250" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>

    <!-- Tool string at bottom of wireline -->
    <!-- CCL (casing collar locator) -->
    <rect x="-8" y="250" width="16" height="25" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <text x="0" y="266" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="middle" opacity="0.6">CCL</text>

    <!-- Gamma ray tool -->
    <rect x="-10" y="280" width="20" height="30" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.8"/>
    <text x="0" y="299" font-family="monospace" font-size="7" fill="#2E86DE" text-anchor="middle" opacity="0.6">GR</text>

    <!-- Perforating gun -->
    <rect x="-12" y="315" width="24" height="55" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <circle cx="-14" cy="330" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="14" cy="330" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="-14" cy="345" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="14" cy="345" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="-14" cy="360" r="2.5" fill="#C8962E" opacity="0.7"/>
    <circle cx="14" cy="360" r="2.5" fill="#C8962E" opacity="0.7"/>
    <text x="0" y="348" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="middle" opacity="0.5">GUN</text>
  </g>

  <!-- Wireline truck/unit — top right -->
  <g transform="translate(500, 60)">
    <!-- Truck body -->
    <rect x="0" y="30" width="120" height="55" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.7"/>
    <!-- Cab -->
    <rect x="120" y="45" width="50" height="40" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <!-- Windshield -->
    <line x1="130" y1="50" x2="160" y2="50" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="30" cy="90" r="10" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <circle cx="90" cy="90" r="10" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <circle cx="145" cy="90" r="10" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>

    <!-- Drum on truck -->
    <circle cx="60" cy="55" r="22" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.7"/>
    <circle cx="60" cy="55" r="14" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="55" r="6" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>

    <!-- Cable from drum to well -->
    <path d="M 38 55 Q -50 55 -100 40 Q -200 20 -300 -20" stroke="#C8962E" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Stimulation pressure chart — bottom right -->
  <g transform="translate(460, 250)">
    <rect x="0" y="0" width="280" height="150" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.4"/>
    <text x="140" y="20" font-family="monospace" font-size="10" fill="#2E86DE" text-anchor="middle" opacity="0.5">PRESSION vs TEMPS</text>

    <!-- Pressure curve -->
    <path d="M 20 130 L 40 125 L 60 120 L 80 110 L 100 60 L 120 40 L 140 35 L 160 38 L 180 50 L 200 70 L 220 90 L 240 100 L 260 105"
          stroke="#C8962E" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Rate curve -->
    <path d="M 20 130 L 40 130 L 60 125 L 80 80 L 100 50 L 120 48 L 140 50 L 160 55 L 180 60 L 200 65 L 220 70 L 240 75 L 260 78"
          stroke="#28A745" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round" stroke-dasharray="5,3"/>

    <!-- Breakdown point marker -->
    <circle cx="100" cy="60" r="4" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="52" font-family="monospace" font-size="8" fill="#C8962E" text-anchor="middle" opacity="0.5">BDP</text>
  </g>
</svg>
