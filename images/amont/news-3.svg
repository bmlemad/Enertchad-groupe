<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Article actualité 3 - Report with analysis">
  <defs>
    <linearGradient id="grad_news3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="hatch_news3" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#2E86DE" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_news3)"/>
  <rect width="800" height="450" fill="url(#hatch_news3)"/>
  
  <!-- Report document layout -->
  <g transform="translate(70, 50)">
    <!-- Cover/Title -->
    <rect x="0" y="0" width="300" height="280" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <rect x="10" y="10" width="280" height="260" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Report title -->
    <text x="150" y="60" font-family="Georgia, serif" font-size="16" fill="#C8962E" text-anchor="middle" opacity="0.85" font-weight="bold">Quarterly</text>
    <text x="150" y="85" font-family="Georgia, serif" font-size="16" fill="#C8962E" text-anchor="middle" opacity="0.85" font-weight="bold">Report</text>
    <text x="150" y="115" font-family="Georgia, serif" font-size="12" fill="#2E86DE" text-anchor="middle" opacity="0.75">Q1 2026</text>
    
    <!-- Document lines -->
    <line x1="30" y1="140" x2="270" y2="140" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="160" x2="270" y2="160" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="180" x2="270" y2="180" stroke="#C8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="200" x2="270" y2="200" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="220" x2="270" y2="220" stroke="#C8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="240" x2="270" y2="240" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Analysis charts right side -->
  <g transform="translate(420, 80)">
    <!-- Chart 1: Bar graph -->
    <text x="0" y="-15" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.8" font-weight="bold">Production Trend</text>
    <rect x="0" y="0" width="15" height="60" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <rect x="20" y="-15" width="15" height="75" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <rect x="40" y="-5" width="15" height="65" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <rect x="60" y="-25" width="15" height="85" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="-10" y1="60" x2="80" y2="60" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    
    <!-- Chart 2: Efficiency metrics -->
    <g transform="translate(0, 120)">
      <text x="0" y="-10" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.8" font-weight="bold">Key Metrics</text>
      <circle cx="25" cy="20" r="15" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
      <path d="M 25 5 A 15 15 0 0 1 40 20" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
      <text x="25" y="42" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">73%</text>
    </g>
    
    <!-- Chart 3: Compliance gauge -->
    <g transform="translate(100, 120)">
      <text x="0" y="-10" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.8" font-weight="bold">Compliance</text>
      <rect x="0" y="10" width="80" height="15" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
      <rect x="0" y="10" width="64" height="15" fill="#C8962E" opacity="0.5"/>
      <text x="85" y="22" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.6">80%</text>
    </g>
  </g>
</svg>
