<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forage et Puits - Derrick tower">
  <defs>
    <linearGradient id="grad_op01" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op01)"/>

  <!-- Ground line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#C8962E" stroke-width="2.5" opacity="0.5"/>

  <!-- Ground texture -->
  <path d="M 0 400 Q 100 395 200 400 Q 300 405 400 400 Q 500 395 600 400 Q 700 405 800 400" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.3"/>

  <!-- LARGE prominent derrick — centered -->
  <g transform="translate(400, 30)">
    <!-- Main A-frame legs -->
    <line x1="0" y1="0" x2="-80" y2="370" stroke="#C8962E" stroke-width="4" opacity="0.85"/>
    <line x1="0" y1="0" x2="80" y2="370" stroke="#C8962E" stroke-width="4" opacity="0.85"/>

    <!-- Cross bracing (X-pattern) -->
    <line x1="-16" y1="74" x2="16" y2="74" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="-32" y1="148" x2="32" y2="148" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="-48" y1="222" x2="48" y2="222" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <line x1="-64" y1="296" x2="64" y2="296" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>

    <!-- Diagonal braces -->
    <line x1="-16" y1="74" x2="32" y2="148" stroke="#C8962E" stroke-width="1" opacity="0.35"/>
    <line x1="16" y1="74" x2="-32" y2="148" stroke="#C8962E" stroke-width="1" opacity="0.35"/>
    <line x1="-32" y1="148" x2="48" y2="222" stroke="#C8962E" stroke-width="1" opacity="0.35"/>
    <line x1="32" y1="148" x2="-48" y2="222" stroke="#C8962E" stroke-width="1" opacity="0.35"/>
    <line x1="-48" y1="222" x2="64" y2="296" stroke="#C8962E" stroke-width="1" opacity="0.35"/>
    <line x1="48" y1="222" x2="-64" y2="296" stroke="#C8962E" stroke-width="1" opacity="0.35"/>

    <!-- Crown block at top -->
    <rect x="-12" y="-5" width="24" height="15" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="2" r="4" fill="#C8962E" opacity="0.7"/>

    <!-- Traveling block & hook -->
    <line x1="0" y1="10" x2="0" y2="200" stroke="#C8962E" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
    <rect x="-8" y="195" width="16" height="20" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <path d="M 0 215 L 0 230 Q -6 240 0 245 Q 6 240 0 230" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>

    <!-- V-door ramp left -->
    <line x1="-80" y1="370" x2="-160" y2="370" stroke="#C8962E" stroke-width="3" opacity="0.5"/>
    <line x1="-80" y1="370" x2="-120" y2="340" stroke="#2E86DE" stroke-width="2" opacity="0.4"/>

    <!-- Substructure -->
    <rect x="-90" y="365" width="180" height="30" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.5"/>

    <!-- Mud tanks right side -->
    <rect x="110" y="340" width="60" height="30" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.5"/>
    <rect x="110" y="310" width="60" height="30" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Stars/atmosphere top -->
  <circle cx="100" cy="60" r="1.5" fill="#2E86DE" opacity="0.3"/>
  <circle cx="250" cy="40" r="1" fill="#C8962E" opacity="0.25"/>
  <circle cx="600" cy="50" r="1.5" fill="#2E86DE" opacity="0.3"/>
  <circle cx="700" cy="80" r="1" fill="#C8962E" opacity="0.25"/>
  <circle cx="150" cy="100" r="1" fill="#2E86DE" opacity="0.2"/>
</svg>
