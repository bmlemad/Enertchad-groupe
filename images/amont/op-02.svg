<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Production et levage artificiel — ESP cross-section and production curves">
  <defs>
    <linearGradient id="grad_op02" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06101E;stop-opacity:1" />
    </linearGradient>
    <!-- Subsurface gradient (earth layers) -->
    <linearGradient id="earth_op02" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1A2D4A" />
      <stop offset="40%" stop-color="#14233A" />
      <stop offset="70%" stop-color="#0F1A2D" />
      <stop offset="100%" stop-color="#0A1220" />
    </linearGradient>
    <pattern id="rock_op02" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="0.8" fill="#C8962E" opacity="0.04"/>
      <circle cx="10" cy="11" r="0.6" fill="#2E86DE" opacity="0.04"/>
    </pattern>
    <marker id="arr02" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#28A745" opacity="0.8"/>
    </marker>
    <marker id="arr02g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#C8962E" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op02)"/>

  <!-- Surface line -->
  <line x1="0" y1="95" x2="800" y2="95" stroke="#C8962E" stroke-width="1.5" opacity="0.3"/>
  <text x="20" y="88" font-family="monospace" font-size="8" fill="#C8962E" opacity="0.35">SURFACE 0m</text>

  <!-- Subsurface earth fill -->
  <rect x="0" y="95" width="380" height="355" fill="url(#earth_op02)"/>
  <rect x="0" y="95" width="380" height="355" fill="url(#rock_op02)"/>

  <!-- Geological strata lines -->
  <path d="M 0 140 Q 90 135 190 142 Q 280 148 380 138" stroke="#2E86DE" stroke-width="0.6" opacity="0.15" fill="none"/>
  <path d="M 0 200 Q 100 210 190 205 Q 290 195 380 208" stroke="#C8962E" stroke-width="0.6" opacity="0.15" fill="none"/>
  <path d="M 0 270 Q 80 265 190 272 Q 300 278 380 268" stroke="#2E86DE" stroke-width="0.6" opacity="0.12" fill="none"/>
  <path d="M 0 340 Q 120 348 190 342 Q 280 335 380 345" stroke="#C8962E" stroke-width="0.6" opacity="0.12" fill="none"/>

  <!-- ===== WELL CASING — central vertical ===== -->
  <g transform="translate(190, 0)">
    <!-- Surface casing (wide) -->
    <rect x="-25" y="50" width="50" height="50" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6" rx="2"/>
    <!-- Wellhead on surface -->
    <rect x="-30" y="42" width="60" height="12" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8" rx="3"/>
    <rect x="-18" y="30" width="36" height="14" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Christmas tree valves -->
    <rect x="-10" y="18" width="20" height="14" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.65" rx="2"/>
    <line x1="-6" y1="25" x2="6" y2="25" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <!-- Flowline from wellhead -->
    <path d="M 30 36 L 80 36 L 80 50 L 130 50" stroke="#28A745" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#arr02)"/>
    <text x="95" y="45" font-family="monospace" font-size="7" fill="#28A745" opacity="0.5">FLOWLINE</text>

    <!-- Intermediate casing -->
    <rect x="-20" y="95" width="40" height="170" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.4"/>

    <!-- Production tubing (inner string) -->
    <rect x="-8" y="55" width="16" height="330" fill="none" stroke="#C8962E" stroke-width="1.8" opacity="0.55" rx="1"/>

    <!-- Cement annulus marks -->
    <g opacity="0.15">
      <line x1="-25" y1="105" x2="-20" y2="105" stroke="#C8962E" stroke-width="3"/>
      <line x1="20" y1="105" x2="25" y2="105" stroke="#C8962E" stroke-width="3"/>
      <line x1="-25" y1="120" x2="-20" y2="120" stroke="#C8962E" stroke-width="3"/>
      <line x1="20" y1="120" x2="25" y2="120" stroke="#C8962E" stroke-width="3"/>
      <line x1="-25" y1="135" x2="-20" y2="135" stroke="#C8962E" stroke-width="3"/>
      <line x1="20" y1="135" x2="25" y2="135" stroke="#C8962E" stroke-width="3"/>
    </g>

    <!-- ===== ESP (Electric Submersible Pump) at depth ===== -->
    <g transform="translate(0, 290)">
      <!-- Motor housing -->
      <rect x="-6" y="30" width="12" height="40" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7" rx="2"/>
      <text x="20" y="55" font-family="monospace" font-size="7" fill="#2E86DE" opacity="0.5">MOTOR</text>
      <!-- Pump stages -->
      <rect x="-7" y="5" width="14" height="25" fill="none" stroke="#28A745" stroke-width="2" opacity="0.7" rx="2"/>
      <line x1="-4" y1="12" x2="4" y2="12" stroke="#28A745" stroke-width="1" opacity="0.5"/>
      <line x1="-4" y1="18" x2="4" y2="18" stroke="#28A745" stroke-width="1" opacity="0.5"/>
      <line x1="-4" y1="24" x2="4" y2="24" stroke="#28A745" stroke-width="1" opacity="0.5"/>
      <text x="20" y="20" font-family="monospace" font-size="7" fill="#28A745" opacity="0.5">PUMP</text>
      <!-- Intake -->
      <rect x="-5" y="-5" width="10" height="12" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6" rx="1"/>
      <text x="20" y="4" font-family="monospace" font-size="7" fill="#C8962E" opacity="0.4">INTAKE</text>
      <!-- Flow arrows into intake -->
      <path d="M -35 0 Q -20 -5 -5 0" stroke="#28A745" stroke-width="1.2" fill="none" opacity="0.5" marker-end="url(#arr02)"/>
      <path d="M -30 15 Q -18 8 -6 12" stroke="#28A745" stroke-width="1.2" fill="none" opacity="0.4" marker-end="url(#arr02)"/>
    </g>

    <!-- Perforations (reservoir zone) -->
    <g transform="translate(0, 350)">
      <line x1="-20" y1="0" x2="-30" y2="-5" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
      <line x1="-20" y1="8" x2="-32" y2="5" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
      <line x1="-20" y1="16" x2="-28" y2="20" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
      <line x1="20" y1="2" x2="30" y2="-3" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
      <line x1="20" y1="10" x2="32" y2="8" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
      <line x1="20" y1="18" x2="28" y2="22" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Depth scale (left side) -->
    <g transform="translate(-60, 0)">
      <line x1="0" y1="95" x2="0" y2="400" stroke="#C8962E" stroke-width="0.8" opacity="0.25"/>
      <line x1="-5" y1="95" x2="5" y2="95" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
      <text x="-8" y="98" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="end" opacity="0.35">0</text>
      <line x1="-5" y1="170" x2="5" y2="170" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
      <text x="-8" y="173" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="end" opacity="0.35">500</text>
      <line x1="-5" y1="245" x2="5" y2="245" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
      <text x="-8" y="248" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="end" opacity="0.35">1000</text>
      <line x1="-5" y1="320" x2="5" y2="320" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
      <text x="-8" y="323" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="end" opacity="0.35">1500</text>
      <line x1="-5" y1="395" x2="5" y2="395" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
      <text x="-8" y="398" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="end" opacity="0.35">2000m</text>
    </g>
  </g>

  <!-- GAS-LIFT side annotation (left of well) -->
  <g transform="translate(55, 150)">
    <text x="0" y="0" font-family="monospace" font-size="8" fill="#C8962E" opacity="0.45" font-weight="bold">GAS-LIFT</text>
    <circle cx="12" cy="20" r="4" fill="none" stroke="#C8962E" stroke-width="1.2" opacity="0.5"/>
    <text x="12" y="23" font-family="monospace" font-size="5" fill="#C8962E" text-anchor="middle" opacity="0.5">GL</text>
    <circle cx="12" cy="55" r="4" fill="none" stroke="#C8962E" stroke-width="1.2" opacity="0.5"/>
    <text x="12" y="58" font-family="monospace" font-size="5" fill="#C8962E" text-anchor="middle" opacity="0.5">GL</text>
    <circle cx="12" cy="90" r="4" fill="none" stroke="#C8962E" stroke-width="1.2" opacity="0.5"/>
    <text x="12" y="93" font-family="monospace" font-size="5" fill="#C8962E" text-anchor="middle" opacity="0.5">GL</text>
    <!-- Gas injection arrows -->
    <path d="M 16 20 L 100 20" stroke="#C8962E" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="3 2" marker-end="url(#arr02g)"/>
    <path d="M 16 55 L 95 55" stroke="#C8962E" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="3 2" marker-end="url(#arr02g)"/>
    <path d="M 16 90 L 90 90" stroke="#C8962E" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="3 2" marker-end="url(#arr02g)"/>
  </g>

  <!-- ===== RIGHT SIDE: Production Dashboard ===== -->

  <!-- Production decline curve -->
  <g transform="translate(410, 30)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.55" font-weight="bold">PRODUCTION PROFILE</text>
    <!-- Axes -->
    <line x1="0" y1="15" x2="0" y2="130" stroke="#C8962E" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="130" x2="340" y2="130" stroke="#C8962E" stroke-width="1" opacity="0.3"/>
    <!-- Y-axis labels -->
    <text x="-5" y="22" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="end" opacity="0.3">1200</text>
    <text x="-5" y="55" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="end" opacity="0.3">800</text>
    <text x="-5" y="90" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="end" opacity="0.3">400</text>
    <text x="-5" y="130" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="end" opacity="0.3">0</text>
    <text x="-10" y="75" font-family="monospace" font-size="7" fill="#C8962E" transform="rotate(-90,-10,75)" text-anchor="middle" opacity="0.35">bbl/d</text>
    <!-- X-axis -->
    <text x="170" y="145" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="middle" opacity="0.35">mois</text>
    <!-- Grid lines -->
    <line x1="0" y1="45" x2="340" y2="45" stroke="#2E86DE" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="75" x2="340" y2="75" stroke="#2E86DE" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="105" x2="340" y2="105" stroke="#2E86DE" stroke-width="0.3" opacity="0.15"/>
    <!-- Natural decline curve (orange, dashed) -->
    <path d="M 0 20 Q 40 28 80 50 Q 120 72 160 88 Q 200 100 240 108 Q 280 113 340 118" stroke="#C8962E" stroke-width="1.8" fill="none" opacity="0.6" stroke-dasharray="5 3"/>
    <!-- With ESP curve (blue, solid — higher production) -->
    <path d="M 0 20 Q 40 22 80 28 Q 120 35 160 48 Q 200 62 240 75 Q 280 85 340 92" stroke="#2E86DE" stroke-width="2.2" fill="none" opacity="0.7"/>
    <!-- With gas-lift curve (green) -->
    <path d="M 0 20 Q 40 25 80 38 Q 120 52 160 66 Q 200 78 240 88 Q 280 96 340 102" stroke="#28A745" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Legend -->
    <line x1="200" y1="15" x2="220" y2="15" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <text x="225" y="18" font-family="monospace" font-size="7" fill="#2E86DE" opacity="0.5">ESP</text>
    <line x1="250" y1="15" x2="270" y2="15" stroke="#28A745" stroke-width="1.5" opacity="0.5"/>
    <text x="275" y="18" font-family="monospace" font-size="7" fill="#28A745" opacity="0.5">G-LIFT</text>
    <line x1="305" y1="15" x2="325" y2="15" stroke="#C8962E" stroke-width="1.8" opacity="0.6" stroke-dasharray="5 3"/>
    <text x="330" y="18" font-family="monospace" font-size="7" fill="#C8962E" opacity="0.5">NAT</text>
  </g>

  <!-- Separator schematic -->
  <g transform="translate(420, 195)">
    <text x="0" y="0" font-family="monospace" font-size="8" fill="#2E86DE" opacity="0.5" font-weight="bold">TRIPHASIC SEPARATOR</text>
    <!-- Vessel outline -->
    <ellipse cx="10" cy="40" rx="10" ry="25" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <rect x="10" y="15" width="160" height="50" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="170" cy="40" rx="10" ry="25" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <!-- Internal baffles -->
    <line x1="60" y1="18" x2="60" y2="55" stroke="#2E86DE" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="18" x2="120" y2="55" stroke="#2E86DE" stroke-width="1" opacity="0.3"/>
    <!-- Phase labels -->
    <text x="35" y="43" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="middle" opacity="0.4">OIL</text>
    <text x="90" y="43" font-family="monospace" font-size="6" fill="#2E86DE" text-anchor="middle" opacity="0.4">WATER</text>
    <text x="145" y="43" font-family="monospace" font-size="6" fill="#28A745" text-anchor="middle" opacity="0.4">GAS</text>
    <!-- Output arrows -->
    <path d="M 35 65 L 35 80" stroke="#C8962E" stroke-width="1.2" fill="none" opacity="0.4" marker-end="url(#arr02g)"/>
    <path d="M 90 65 L 90 80" stroke="#2E86DE" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M 145 15 L 145 5" stroke="#28A745" stroke-width="1.2" fill="none" opacity="0.4" marker-end="url(#arr02)"/>
    <text x="35" y="90" font-family="monospace" font-size="6" fill="#C8962E" text-anchor="middle" opacity="0.35">28°API</text>
    <text x="90" y="90" font-family="monospace" font-size="6" fill="#2E86DE" text-anchor="middle" opacity="0.35">INJECT</text>
    <text x="145" y="-2" font-family="monospace" font-size="6" fill="#28A745" text-anchor="middle" opacity="0.35">FLARE/USE</text>
  </g>

  <!-- KPI gauges bottom right -->
  <g transform="translate(420, 320)">
    <!-- Gauge 1: Recovery rate -->
    <g transform="translate(0, 0)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#2E86DE" stroke-width="1" opacity="0.2"/>
      <path d="M 40 78 A 38 38 0 1 1 40 2" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.15"/>
      <!-- Progress arc (~75%) -->
      <path d="M 40 78 A 38 38 0 1 1 8.5 20" fill="none" stroke="#28A745" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <text x="40" y="38" font-family="monospace" font-size="16" fill="#28A745" text-anchor="middle" opacity="0.7" font-weight="bold">28%</text>
      <text x="40" y="52" font-family="monospace" font-size="7" fill="#28A745" text-anchor="middle" opacity="0.4">RECOVERY</text>
    </g>
    <!-- Gauge 2: Uptime -->
    <g transform="translate(110, 0)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.2"/>
      <path d="M 40 78 A 38 38 0 1 1 40 2" fill="none" stroke="#C8962E" stroke-width="0.8" opacity="0.15"/>
      <!-- Progress arc (~95%) -->
      <path d="M 40 78 A 38 38 0 1 1 73 56" fill="none" stroke="#C8962E" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <text x="40" y="38" font-family="monospace" font-size="16" fill="#C8962E" text-anchor="middle" opacity="0.7" font-weight="bold">96%</text>
      <text x="40" y="52" font-family="monospace" font-size="7" fill="#C8962E" text-anchor="middle" opacity="0.4">UPTIME</text>
    </g>
    <!-- Gauge 3: Wells managed -->
    <g transform="translate(220, 0)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#2E86DE" stroke-width="1" opacity="0.2"/>
      <path d="M 40 78 A 38 38 0 1 1 40 2" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.15"/>
      <text x="40" y="38" font-family="monospace" font-size="16" fill="#2E86DE" text-anchor="middle" opacity="0.7" font-weight="bold">120+</text>
      <text x="40" y="52" font-family="monospace" font-size="7" fill="#2E86DE" text-anchor="middle" opacity="0.4">WELLS</text>
    </g>
  </g>

  <!-- Reservoir zone label -->
  <text x="30" y="375" font-family="monospace" font-size="8" fill="#C8962E" opacity="0.3">RÉSERVOIR · GRÈS BARRÉMIEN</text>
  <text x="30" y="390" font-family="monospace" font-size="7" fill="#2E86DE" opacity="0.25">PORO 18% · PERM 250 mD · Sw 32%</text>
</svg>