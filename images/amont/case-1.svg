<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Doba field study - Oil field map">
  <defs>
    <linearGradient id="grad_case1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_case1" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#28A745" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_case1)"/>
  <rect width="800" height="450" fill="url(#dots_case1)"/>
  
  <!-- Doba field map left -->
  <g transform="translate(80, 80)">
    <!-- Field boundary -->
    <path d="M 20 0 Q 50 -10 80 20 Q 100 50 70 100 Q 40 110 20 80 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Well locations -->
    <circle cx="40" cy="30" r="4" fill="#2E86DE" opacity="0.85"/>
    <circle cx="60" cy="50" r="4" fill="#C8962E" opacity="0.85"/>
    <circle cx="35" cy="65" r="4" fill="#2E86DE" opacity="0.85"/>
    <circle cx="50" cy="45" r="4" fill="#C8962E" opacity="0.85"/>
    <circle cx="65" cy="75" r="4" fill="#2E86DE" opacity="0.85"/>
    
    <!-- Interconnect lines -->
    <line x1="40" y1="30" x2="60" y2="50" stroke="#2E86DE" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="60" y1="50" x2="50" y2="45" stroke="#C8962E" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="50" y1="45" x2="35" y2="65" stroke="#2E86DE" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
    
    <!-- Field name -->
    <text x="50" y="120" font-family="Georgia, serif" font-size="14" fill="#C8962E" text-anchor="middle" opacity="0.8" font-weight="bold">DOBA FIELD</text>
  </g>
  
  <!-- Production curve center-right -->
  <g transform="translate(330, 100)">
    <!-- Curve area -->
    <rect x="0" y="0" width="200" height="150" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    
    <!-- X-axis labels (time) -->
    <text x="10" y="160" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.6">2000</text>
    <text x="85" y="160" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.6">2010</text>
    <text x="170" y="160" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.6">2020</text>
    
    <!-- Y-axis labels -->
    <text x="-15" y="155" font-family="monospace" font-size="8" fill="#2E86DE" opacity="0.6">0</text>
    <text x="-15" y="105" font-family="monospace" font-size="8" fill="#2E86DE" opacity="0.6">250</text>
    <text x="-15" y="55" font-family="monospace" font-size="8" fill="#2E86DE" opacity="0.6">500</text>
    
    <!-- Production curve (rising then declining) -->
    <path d="M 10 150 Q 50 80 100 40 Q 130 30 160 50 Q 180 70 200 100" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
    
    <!-- Fill under curve -->
    <path d="M 10 150 Q 50 80 100 40 Q 130 30 160 50 Q 180 70 200 100 L 200 150 Z" fill="#C8962E" opacity="0.2"/>
    
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Key statistics bottom -->
  <g transform="translate(100, 310)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.8" font-weight="bold">Peak Output: 225K bbl/d</text>
    <text x="0" y="20" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.8" font-weight="bold">Discovered: 2000 | Produced: 22 years</text>
  </g>
</svg>
