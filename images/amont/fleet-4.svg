<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mobile labs - Laboratory on wheels">
  <defs>
    <linearGradient id="grad_fleet4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_fleet4" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_fleet4)"/>
  <rect width="800" height="450" fill="url(#grid_fleet4)"/>
  
  <!-- Mobile lab unit left -->
  <g transform="translate(100, 110)">
    <!-- Trailer body -->
    <rect x="0" y="0" width="100" height="60" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Windows/portholes -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <circle cx="50" cy="20" r="8" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <circle cx="80" cy="20" r="8" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Door -->
    <rect x="35" y="35" width="30" height="25" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <line x1="50" y1="35" x2="50" y2="60" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    
    <!-- Wheels -->
    <circle cx="15" cy="65" r="6" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <circle cx="85" cy="65" r="6" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    
    <!-- Axle -->
    <line x1="15" y1="65" x2="85" y2="65" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Microscope center -->
  <g transform="translate(360, 120)">
    <!-- Microscope structure -->
    <rect x="20" y="0" width="40" height="60" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <!-- Objective lens -->
    <circle cx="40" cy="70" r="8" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <!-- Eyepiece -->
    <circle cx="40" cy="5" r="5" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <!-- Stage -->
    <rect x="30" y="58" width="20" height="8" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <!-- Focus knob -->
    <circle cx="60" cy="30" r="4" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <!-- Illumination -->
    <path d="M 40 75 Q 35 85 40 95" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Testing equipment right -->
  <g transform="translate(550, 120)">
    <!-- Centrifuge -->
    <circle cx="25" cy="25" r="18" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <circle cx="25" cy="25" r="12" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <line x1="25" y1="7" x2="25" y2="0" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <text x="25" y="50" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">CENTRIFUGE</text>
    
    <!-- Analyzer -->
    <rect x="65" y="10" width="30" height="40" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <rect x="70" y="15" width="20" height="8" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <rect x="70" y="28" width="20" height="8" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="80" y="55" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.6">ANALYZER</text>
  </g>
  
  <!-- Lab operations status bottom -->
  <g transform="translate(120, 310)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#C8962E" opacity="0.8" font-weight="bold">Sample Analysis:</text>
    <circle cx="8" cy="20" r="4" fill="#28A745" opacity="0.8"/>
    <text x="20" y="24" font-family="monospace" font-size="10" fill="#28A745" opacity="0.7">OPERATIONAL</text>
  </g>
  
  <g transform="translate(450, 310)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#2E86DE" opacity="0.8" font-weight="bold">Equipment Ready:</text>
    <rect x="0" y="12" width="100" height="10" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <rect x="0" y="12" width="85" height="10" fill="#2E86DE" opacity="0.5"/>
    <text x="110" y="20" font-family="monospace" font-size="10" fill="#2E86DE" opacity="0.6">85%</text>
  </g>
</svg>
