<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ingénierie - Technical drawing and compass">
  <defs>
    <linearGradient id="grad_op05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <!-- Fine blueprint grid -->
    <pattern id="bp_op05" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="none" stroke="#2E86DE" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op05)"/>
  <rect width="800" height="450" fill="url(#bp_op05)"/>

  <!-- Large compass rose — left-center -->
  <g transform="translate(250, 225)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#C8962E" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.4"/>

    <!-- Cardinal directions — bold arrows -->
    <path d="M 0 -120 L 8 -50 L 0 -60 L -8 -50 Z" fill="#C8962E" opacity="0.6"/>
    <path d="M 0 120 L 8 50 L 0 60 L -8 50 Z" fill="#2E86DE" opacity="0.5"/>
    <path d="M -120 0 L -50 8 L -60 0 L -50 -8 Z" fill="#2E86DE" opacity="0.5"/>
    <path d="M 120 0 L 50 8 L 60 0 L 50 -8 Z" fill="#C8962E" opacity="0.6"/>

    <!-- Intercardinal ticks -->
    <line x1="85" y1="-85" x2="92" y2="-92" stroke="#C8962E" stroke-width="1.5" opacity="0.4"/>
    <line x1="85" y1="85" x2="92" y2="92" stroke="#C8962E" stroke-width="1.5" opacity="0.4"/>
    <line x1="-85" y1="-85" x2="-92" y2="-92" stroke="#C8962E" stroke-width="1.5" opacity="0.4"/>
    <line x1="-85" y1="85" x2="-92" y2="92" stroke="#C8962E" stroke-width="1.5" opacity="0.4"/>

    <!-- Degree marks around circle -->
    <line x1="0" y1="-118" x2="0" y2="-125" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="-102" x2="63" y2="-108" stroke="#C8962E" stroke-width="0.8" opacity="0.35"/>
    <line x1="102" y1="-60" x2="108" y2="-63" stroke="#C8962E" stroke-width="0.8" opacity="0.35"/>
    <line x1="118" y1="0" x2="125" y2="0" stroke="#C8962E" stroke-width="1" opacity="0.5"/>

    <!-- Center point -->
    <circle cx="0" cy="0" r="4" fill="#C8962E" opacity="0.7"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Technical plan view — right side -->
  <g transform="translate(480, 80)">
    <!-- Equipment plan rectangle -->
    <rect x="0" y="0" width="250" height="160" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>

    <!-- Internal layout -->
    <rect x="15" y="15" width="80" height="55" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <rect x="110" y="15" width="125" height="55" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <rect x="15" y="85" width="220" height="60" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>

    <!-- Dimension arrows -->
    <line x1="0" y1="-12" x2="250" y2="-12" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-18" x2="0" y2="-6" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="250" y1="-18" x2="250" y2="-6" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="125" y="-20" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.5">12 500 mm</text>

    <line x1="262" y1="0" x2="262" y2="160" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="256" y1="0" x2="268" y2="0" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="256" y1="160" x2="268" y2="160" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="280" y="85" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.5" transform="rotate(90 280 85)">8 200 mm</text>

    <!-- Labels -->
    <text x="55" y="45" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.5">PUMP</text>
    <text x="172" y="45" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.5">SEPARATOR</text>
    <text x="125" y="120" font-family="monospace" font-size="8" fill="#C8962E" text-anchor="middle" opacity="0.5">MANIFOLD</text>
  </g>

  <!-- Title block bottom right -->
  <g transform="translate(480, 310)">
    <rect x="0" y="0" width="250" height="90" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="30" x2="250" y2="30" stroke="#C8962E" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="60" x2="250" y2="60" stroke="#C8962E" stroke-width="1" opacity="0.4"/>
    <line x1="130" y1="0" x2="130" y2="90" stroke="#C8962E" stroke-width="1" opacity="0.4"/>
    <text x="65" y="18" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.5">DRAWING</text>
    <text x="190" y="18" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.5">REV. 03</text>
    <text x="65" y="48" font-family="monospace" font-size="8" fill="#C8962E" text-anchor="middle" opacity="0.5">SCALE</text>
    <text x="190" y="48" font-family="monospace" font-size="8" fill="#C8962E" text-anchor="middle" opacity="0.5">1:50</text>
  </g>
</svg>
