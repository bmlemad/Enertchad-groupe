<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CFO - Directeur Financier">
  <defs>
    <linearGradient id="grad_team4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_team4" width="55" height="55" patternUnits="userSpaceOnUse">
      <path d="M 55 0 L 0 0 0 55" fill="none" stroke="#C8962E" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_team4)"/>
  <rect width="800" height="450" fill="url(#grid_team4)"/>
  
  <!-- Financial charts left -->
  <g transform="translate(100, 110)">
    <!-- Chart 1: Bar graph -->
    <rect x="0" y="50" width="12" height="50" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <rect x="16" y="30" width="12" height="70" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <rect x="32" y="40" width="12" height="60" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <rect x="48" y="20" width="12" height="80" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="-5" y1="100" x2="65" y2="100" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Labels -->
    <text x="6" y="120" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">Q1</text>
    <text x="22" y="120" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">Q2</text>
    <text x="38" y="120" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">Q3</text>
    <text x="54" y="120" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">Q4</text>
  </g>
  
  <!-- Pie chart center -->
  <g transform="translate(380, 130)">
    <!-- Circle boundary -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    
    <!-- Pie segments -->
    <path d="M 0 0 L 0 -40 A 40 40 0 0 1 28 -28 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <path d="M 0 0 L 28 -28 A 40 40 0 0 1 40 0 Z" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.8"/>
    <path d="M 0 0 L 40 0 A 40 40 0 0 1 0 40 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <path d="M 0 0 L 0 40 A 40 40 0 0 1 -28 28 Z" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.8"/>
    <path d="M 0 0 L -28 28 A 40 40 0 0 1 0 -40 Z" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Center label -->
    <circle cx="0" cy="0" r="5" fill="#C8962E" opacity="0.7"/>
  </g>
  
  <!-- Financial indicators/gold bar right -->
  <g transform="translate(570, 120)">
    <!-- Gold bar representation -->
    <rect x="0" y="0" width="80" height="20" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    <rect x="2" y="2" width="76" height="16" fill="#C8962E" opacity="0.4"/>
    <!-- Segments -->
    <line x1="20" y1="0" x2="20" y2="20" stroke="#C8962E" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="0" x2="40" y2="20" stroke="#C8962E" stroke-width="1" opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="20" stroke="#C8962E" stroke-width="1" opacity="0.6"/>
    
    <!-- Value indicator -->
    <text x="40" y="50" font-family="monospace" font-size="12" fill="#C8962E" text-anchor="middle" opacity="0.8" font-weight="bold">$2.5M</text>
    
    <!-- Growth arrow -->
    <path d="M 20 65 L 60 45" stroke="#2E86DE" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 55 45 L 60 35 L 65 45" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Budget allocation bottom -->
  <g transform="translate(80, 310)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.7">CAPEX:</text>
    <rect x="0" y="10" width="120" height="8" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <rect x="0" y="10" width="72" height="8" fill="#C8962E" opacity="0.5"/>
    <text x="130" y="16" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.6">60%</text>
  </g>
  
  <g transform="translate(380, 310)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.7">OPEX:</text>
    <rect x="0" y="10" width="120" height="8" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <rect x="0" y="10" width="96" height="8" fill="#2E86DE" opacity="0.5"/>
    <text x="130" y="16" font-family="monospace" font-size="10" fill="#2E86DE" opacity="0.6">80%</text>
  </g>
</svg>
