<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bongor basin - Exploration map">
  <defs>
    <linearGradient id="grad_case2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_case2" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_case2)"/>
  <rect width="800" height="450" fill="url(#grid_case2)"/>
  
  <!-- Bongor basin exploration map left -->
  <g transform="translate(80, 80)">
    <!-- Basin boundary -->
    <path d="M 10 20 L 120 10 L 130 60 L 80 100 L 20 70 Z" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Seismic survey lines -->
    <line x1="20" y1="30" x2="120" y2="50" stroke="#C8962E" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
    <line x1="20" y1="50" x2="120" y2="70" stroke="#C8962E" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
    <line x1="20" y1="70" x2="120" y2="40" stroke="#C8962E" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
    
    <!-- Exploration wells -->
    <circle cx="35" cy="40" r="3.5" fill="#2E86DE" opacity="0.85"/>
    <text x="35" y="62" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.6">EX-1</text>
    
    <circle cx="70" cy="45" r="3.5" fill="#C8962E" opacity="0.85"/>
    <text x="70" y="67" font-family="monospace" font-size="8" fill="#C8962E" text-anchor="middle" opacity="0.6">EX-2</text>
    
    <circle cx="105" cy="55" r="3.5" fill="#2E86DE" opacity="0.85"/>
    <text x="105" y="77" font-family="monospace" font-size="8" fill="#2E86DE" text-anchor="middle" opacity="0.6">EX-3</text>
    
    <!-- Basin label -->
    <text x="65" y="115" font-family="Georgia, serif" font-size="14" fill="#2E86DE" text-anchor="middle" opacity="0.85" font-weight="bold">BONGOR BASIN</text>
  </g>
  
  <!-- Seismic profile center-right -->
  <g transform="translate(330, 100)">
    <!-- Profile box -->
    <rect x="0" y="0" width="200" height="150" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    
    <!-- Horizon lines -->
    <path d="M 0 30 Q 50 20 100 25 Q 150 30 200 25" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <path d="M 0 60 Q 50 55 100 60 Q 150 65 200 60" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <path d="M 0 90 Q 50 85 100 95 Q 150 100 200 90" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <path d="M 0 120 Q 50 115 100 125 Q 150 130 200 120" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Structure contours -->
    <ellipse cx="60" cy="60" rx="25" ry="18" fill="none" stroke="#C8962E" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>
    <ellipse cx="140" cy="50" rx="20" ry="15" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>
    
    <!-- Trap indicators -->
    <circle cx="60" cy="60" r="4" fill="#C8962E" opacity="0.7"/>
    <circle cx="140" cy="50" r="4" fill="#2E86DE" opacity="0.7"/>
  </g>
  
  <!-- Exploration status bottom -->
  <g transform="translate(100, 310)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.8" font-weight="bold">Basin Area: 12,500 km²</text>
    <text x="0" y="20" font-family="monospace" font-size="11" fill="#2E86DE" opacity="0.8" font-weight="bold">Status: ACTIVE EXPLORATION - 3 wells drilled</text>
  </g>
</svg>
