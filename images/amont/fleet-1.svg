<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drilling rigs - Rig tower">
  <defs>
    <linearGradient id="grad_fleet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_fleet1" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2E86DE" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_fleet1)"/>
  <rect width="800" height="450" fill="url(#grid_fleet1)"/>
  
  <!-- Derrick tower center-left -->
  <g transform="translate(200, 60)">
    <!-- Main mast -->
    <line x1="0" y1="0" x2="-8" y2="200" stroke="#C8962E" stroke-width="4" opacity="0.85"/>
    <line x1="0" y1="0" x2="8" y2="200" stroke="#C8962E" stroke-width="4" opacity="0.85"/>
    
    <!-- Cross braces -->
    <line x1="-6" y1="40" x2="6" y2="40" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="-7" y1="80" x2="7" y2="80" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="-8" y1="120" x2="8" y2="120" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="-8" y1="160" x2="8" y2="160" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    
    <!-- Top frame -->
    <rect x="-25" y="-10" width="50" height="20" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    
    <!-- Hook system -->
    <circle cx="0" cy="150" r="6" fill="#C8962E" opacity="0.8"/>
    <line x1="-3" y1="150" x2="-20" y2="200" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="3" y1="150" x2="20" y2="200" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Equipment positioning -->
  <g transform="translate(480, 140)">
    <!-- Mud pump -->
    <rect x="0" y="0" width="40" height="50" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <circle cx="20" cy="25" r="12" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <text x="20" y="28" font-family="monospace" font-size="10" fill="#2E86DE" text-anchor="middle" opacity="0.6">PUMP</text>
    
    <!-- Blowout preventer -->
    <rect x="60" y="0" width="40" height="50" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <path d="M 75 10 L 85 10 L 85 30 L 75 30 Z" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    <text x="80" y="45" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">BOP</text>
  </g>
  
  <!-- Well monitoring bottom -->
  <g transform="translate(120, 310)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#C8962E" opacity="0.8" font-weight="bold">Rig Status</text>
    <circle cx="8" cy="20" r="4" fill="#28A745" opacity="0.8"/>
    <text x="20" y="24" font-family="monospace" font-size="10" fill="#28A745" opacity="0.7">ACTIVE</text>
  </g>
  
  <g transform="translate(380, 310)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#2E86DE" opacity="0.8" font-weight="bold">Depth Monitor</text>
    <rect x="0" y="15" width="100" height="10" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.6"/>
    <rect x="0" y="15" width="65" height="10" fill="#2E86DE" opacity="0.5"/>
    <text x="110" y="24" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">2100m</text>
  </g>
</svg>
