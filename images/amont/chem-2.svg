<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Additifs de production et chimie de surface">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots2" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#2E86DE" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad2)"/>
  <rect width="800" height="450" fill="url(#dots2)"/>
  
  <!-- Shield shape on left -->
  <path d="M 150 100 L 250 100 L 250 200 Q 200 280 150 320 Q 100 280 100 200 Z" fill="none" stroke="#C8962E" stroke-width="3" opacity="0.8"/>
  <path d="M 150 130 L 220 130 L 220 200 Q 185 250 150 280 Q 115 250 115 200 Z" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
  
  <!-- Shield checkmark -->
  <path d="M 140 190 L 160 210 L 190 160" stroke="#C8962E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Chemical formula boxes center-right -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="60" height="50" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <text x="30" y="32" font-family="monospace" font-size="20" fill="#C8962E" text-anchor="middle" opacity="0.8">H₂O</text>
  </g>
  
  <g transform="translate(530, 100)">
    <rect x="0" y="0" width="60" height="50" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <text x="30" y="32" font-family="monospace" font-size="18" fill="#2E86DE" text-anchor="middle" opacity="0.8">CH₄</text>
  </g>
  
  <g transform="translate(610, 80)">
    <rect x="0" y="0" width="60" height="50" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <text x="30" y="32" font-family="monospace" font-size="18" fill="#C8962E" text-anchor="middle" opacity="0.8">NaCl</text>
  </g>
  
  <!-- Protection layers on right -->
  <g transform="translate(520, 200)">
    <rect x="0" y="0" width="200" height="30" rx="5" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    <rect x="10" y="45" width="200" height="30" rx="5" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.6"/>
    <rect x="20" y="90" width="200" height="30" rx="5" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.5"/>
    <circle cx="110" cy="15" r="3" fill="#C8962E" opacity="0.8"/>
    <circle cx="110" cy="60" r="3" fill="#2E86DE" opacity="0.8"/>
    <circle cx="110" cy="105" r="3" fill="#C8962E" opacity="0.8"/>
    <path d="M 115 15 L 130 15" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
    <path d="M 115 60 L 130 60" stroke="#2E86DE" stroke-width="1.5" opacity="0.5"/>
    <path d="M 115 105 L 130 105" stroke="#C8962E" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Decorative lines bottom -->
  <line x1="50" y1="380" x2="200" y2="380" stroke="#C8962E" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="380" x2="550" y2="380" stroke="#2E86DE" stroke-width="2" opacity="0.4"/>
  <line x1="600" y1="380" x2="750" y2="380" stroke="#C8962E" stroke-width="2" opacity="0.5"/>
</svg>
