<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logistique et base-vie - Truck convoy">
  <defs>
    <linearGradient id="grad_op09" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="hatch_op09" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#2E86DE" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op09)"/>
  <rect width="800" height="450" fill="url(#hatch_op09)"/>
  
  <!-- Truck convoy path -->
  <defs>
    <marker id="arrow_op09" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8962E"/>
    </marker>
  </defs>
  <path d="M 50 180 L 750 180" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_op09)" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Truck 1 -->
  <g transform="translate(150, 140)">
    <!-- Cabin -->
    <rect x="0" y="0" width="30" height="25" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    <circle cx="8" cy="32" r="4" fill="#2E86DE" opacity="0.7"/>
    <circle cx="22" cy="32" r="4" fill="#2E86DE" opacity="0.7"/>
    <!-- Cargo box -->
    <rect x="32" y="8" width="45" height="28" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    <line x1="32" y1="17" x2="77" y2="17" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="32" y1="26" x2="77" y2="26" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Truck 2 -->
  <g transform="translate(350, 140)">
    <!-- Cabin -->
    <rect x="0" y="0" width="30" height="25" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <circle cx="8" cy="32" r="4" fill="#C8962E" opacity="0.7"/>
    <circle cx="22" cy="32" r="4" fill="#C8962E" opacity="0.7"/>
    <!-- Cargo box -->
    <rect x="32" y="8" width="45" height="28" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <line x1="32" y1="17" x2="77" y2="17" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="32" y1="26" x2="77" y2="26" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Truck 3 -->
  <g transform="translate(550, 140)">
    <!-- Cabin -->
    <rect x="0" y="0" width="30" height="25" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    <circle cx="8" cy="32" r="4" fill="#2E86DE" opacity="0.7"/>
    <circle cx="22" cy="32" r="4" fill="#2E86DE" opacity="0.7"/>
    <!-- Cargo box -->
    <rect x="32" y="8" width="45" height="28" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    <line x1="32" y1="17" x2="77" y2="17" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="32" y1="26" x2="77" y2="26" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Base camp (tents) bottom -->
  <g transform="translate(150, 280)">
    <!-- Tent 1 -->
    <path d="M 0 0 L 20 -30 L 40 0 Z" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="0" x2="20" y2="-30" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    
    <!-- Tent 2 -->
    <path d="M 50 0 L 70 -30 L 90 0 Z" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    <line x1="70" y1="0" x2="70" y2="-30" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    
    <!-- Tent 3 -->
    <path d="M 100 0 L 120 -30 L 140 0 Z" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="120" y1="0" x2="120" y2="-30" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Supply chain flow -->
  <g transform="translate(450, 280)">
    <!-- Container boxes -->
    <rect x="0" y="0" width="25" height="20" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <rect x="30" y="0" width="25" height="20" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <rect x="60" y="0" width="25" height="20" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Connection arrows -->
    <path d="M 25 10 L 30 10" stroke="#C8962E" stroke-width="1.5" fill="none" marker-end="url(#arrow_op09)" opacity="0.5"/>
    <path d="M 55 10 L 60 10" stroke="#2E86DE" stroke-width="1.5" fill="none" marker-end="url(#arrow_op09)" opacity="0.5"/>
  </g>
</svg>
