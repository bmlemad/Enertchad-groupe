<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Champ de Doba — pipeline de collecte, parc de stockage et paysage sahélien">
  <defs>
    <linearGradient id="skyD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F2240"/>
      <stop offset="0.35" stop-color="#1A3460"/>
      <stop offset="0.65" stop-color="#8A6518"/>
      <stop offset="0.9" stop-color="#D8A73A"/>
      <stop offset="1" stop-color="#F2C354"/>
    </linearGradient>
    <linearGradient id="earthD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A3A18"/>
      <stop offset="0.5" stop-color="#3A1F0A"/>
      <stop offset="1" stop-color="#0A0604"/>
    </linearGradient>
    <linearGradient id="tankD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a3438"/>
      <stop offset="0.5" stop-color="#4A5670"/>
      <stop offset="1" stop-color="#1a2328"/>
    </linearGradient>
    <linearGradient id="pipeD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A06820"/>
      <stop offset="0.5" stop-color="#D8A73A"/>
      <stop offset="1" stop-color="#6a3810"/>
    </linearGradient>
    <radialGradient id="hazeD" cx="0.5" cy="0.75" r="0.5">
      <stop offset="0" stop-color="#d88a3a" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#d88a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#skyD)"/>

  <!-- Sun -->
  <circle cx="1280" cy="340" r="60" fill="#F0DC82" opacity="0.9"/>
  <circle cx="1280" cy="340" r="110" fill="#F2C354" opacity="0.25"/>
  <circle cx="1280" cy="340" r="180" fill="#F2C354" opacity="0.1"/>

  <!-- Clouds thin -->
  <ellipse cx="400" cy="240" rx="180" ry="8" fill="#F2C354" opacity="0.25"/>
  <ellipse cx="900" cy="200" rx="220" ry="6" fill="#F2C354" opacity="0.2"/>
  <ellipse cx="1150" cy="260" rx="140" ry="5" fill="#F2C354" opacity="0.2"/>

  <!-- Distant mountains -->
  <path d="M0,560 L80,520 L160,540 L240,510 L340,530 L420,500 L520,520 L620,490 L720,510 L820,495 L920,515 L1020,490 L1120,505 L1220,485 L1320,505 L1420,480 L1520,500 L1600,485 L1600,600 L0,600 Z" fill="#0F2240" opacity="0.8"/>

  <!-- Closer hills -->
  <path d="M0,620 Q200,590 400,605 T800,600 T1200,608 T1600,598 L1600,680 L0,680 Z" fill="#0F2240" opacity="0.9"/>

  <!-- Haze atmospheric -->
  <rect x="0" y="540" width="1600" height="200" fill="url(#hazeD)"/>

  <!-- Acacia silhouettes (signature sahélien) -->
  <g fill="#0a0604" opacity="0.85">
    <!-- Acacia 1 -->
    <g transform="translate(180,680)">
      <rect x="-2" y="-60" width="4" height="60"/>
      <path d="M0,-60 q-18,-4 -22,-18 q-2,-12 10,-14 q8,-8 20,-4 q12,-6 22,2 q12,0 10,12 q-2,16 -20,20 q-8,6 -20,2 z" />
    </g>
    <!-- Acacia 2 -->
    <g transform="translate(1400,690)">
      <rect x="-2" y="-70" width="4" height="70"/>
      <path d="M0,-70 q-22,-2 -26,-18 q-2,-14 12,-16 q10,-8 22,-4 q14,-6 24,4 q14,0 12,14 q-2,18 -22,20 q-10,4 -22,0 z"/>
    </g>
  </g>

  <!-- Main ground -->
  <rect x="0" y="680" width="1600" height="220" fill="url(#earthD)"/>

  <!-- Dusty road -->
  <path d="M400,900 L620,720 L680,720 L500,900 Z" fill="#3a2412" opacity="0.7"/>
  <path d="M440,900 L640,730 L660,730 L480,900 Z" fill="#5a3a1a" opacity="0.5"/>

  <!-- Storage tank farm (LEFT cluster) -->
  <g transform="translate(180,680)">
    <!-- Tank 1 (large) -->
    <rect x="0" y="-110" width="140" height="110" fill="url(#tankD)"/>
    <ellipse cx="70" cy="-110" rx="70" ry="10" fill="#5A6A80"/>
    <ellipse cx="70" cy="-108" rx="68" ry="8" fill="#3a4560"/>
    <!-- Bands on tank -->
    <rect x="0" y="-80" width="140" height="2" fill="#1a1f22" opacity="0.7"/>
    <rect x="0" y="-50" width="140" height="2" fill="#1a1f22" opacity="0.7"/>
    <!-- Stairs -->
    <path d="M140,0 L140,-100 L150,-100" stroke="#2A3240" stroke-width="3" fill="none"/>
    <line x1="145" y1="-20" x2="150" y2="-20" stroke="#2A3240" stroke-width="2"/>
    <line x1="145" y1="-40" x2="150" y2="-40" stroke="#2A3240" stroke-width="2"/>
    <line x1="145" y1="-60" x2="150" y2="-60" stroke="#2A3240" stroke-width="2"/>
    <line x1="145" y1="-80" x2="150" y2="-80" stroke="#2A3240" stroke-width="2"/>
    <!-- Top vent -->
    <rect x="60" y="-125" width="8" height="15" fill="#2A3240"/>
    <circle cx="64" cy="-130" r="3" fill="#2A3240"/>
    <!-- Tank 2 -->
    <rect x="170" y="-90" width="110" height="90" fill="url(#tankD)"/>
    <ellipse cx="225" cy="-90" rx="55" ry="8" fill="#5A6A80"/>
    <rect x="170" y="-65" width="110" height="2" fill="#1a1f22" opacity="0.7"/>
    <rect x="170" y="-40" width="110" height="2" fill="#1a1f22" opacity="0.7"/>
    <!-- Tank 3 (background smaller) -->
    <rect x="310" y="-75" width="90" height="75" fill="url(#tankD)" opacity="0.85"/>
    <ellipse cx="355" cy="-75" rx="45" ry="6" fill="#4A5670"/>
  </g>

  <!-- Pipeline crossing from LEFT to RIGHT -->
  <g>
    <!-- Main horizontal pipe -->
    <rect x="100" y="780" width="1500" height="22" fill="url(#pipeD)"/>
    <!-- Pipe top highlight -->
    <rect x="100" y="780" width="1500" height="3" fill="#F0DC82" opacity="0.4"/>
    <!-- Pipe bottom shadow -->
    <rect x="100" y="798" width="1500" height="4" fill="#0A0604" opacity="0.8"/>
    <!-- Supports -->
    <g fill="#2B1F10">
      <rect x="220" y="802" width="12" height="25"/>
      <rect x="400" y="802" width="12" height="25"/>
      <rect x="580" y="802" width="12" height="25"/>
      <rect x="760" y="802" width="12" height="25"/>
      <rect x="940" y="802" width="12" height="25"/>
      <rect x="1120" y="802" width="12" height="25"/>
      <rect x="1300" y="802" width="12" height="25"/>
      <rect x="1480" y="802" width="12" height="25"/>
    </g>
    <!-- Weld rings -->
    <g fill="#8a5a1a">
      <rect x="330" y="778" width="4" height="26"/>
      <rect x="560" y="778" width="4" height="26"/>
      <rect x="790" y="778" width="4" height="26"/>
      <rect x="1020" y="778" width="4" height="26"/>
      <rect x="1250" y="778" width="4" height="26"/>
    </g>
  </g>

  <!-- Pump station midway -->
  <g transform="translate(720,780)">
    <rect x="0" y="-60" width="80" height="60" fill="#1A2030"/>
    <rect x="5" y="-58" width="70" height="8" fill="#3a4560"/>
    <rect x="5" y="-45" width="70" height="2" fill="#1a1f22"/>
    <!-- Pump -->
    <circle cx="25" cy="-25" r="12" fill="#c23a1a"/>
    <circle cx="25" cy="-25" r="7" fill="#8a2010"/>
    <rect x="40" y="-30" width="30" height="10" fill="#3a4560"/>
    <rect x="2" y="-8" width="76" height="8" fill="#1a1f22"/>
    <!-- Warning light -->
    <circle cx="40" cy="-68" r="3" fill="#ff6b1a"/>
  </g>

  <!-- Flare stack in distance -->
  <g transform="translate(1050,680)">
    <rect x="-3" y="-180" width="6" height="180" fill="#1a1f22"/>
    <!-- Small flame (FLARING <2%) -->
    <path d="M0,-185 q-5,-10 1,-18 q5,8 1,18 z" fill="#ff8a2a" opacity="0.9"/>
    <path d="M0,-188 q-2,-5 0,-10 q2,5 0,10 z" fill="#F0DC82"/>
    <!-- Guy wires -->
    <line x1="0" y1="-100" x2="-40" y2="-10" stroke="#1a1f22" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-100" x2="40" y2="-10" stroke="#1a1f22" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-60" x2="-25" y2="-10" stroke="#1a1f22" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-60" x2="25" y2="-10" stroke="#1a1f22" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Transmission pylons in background -->
  <g fill="#0a0604" opacity="0.7">
    <g transform="translate(850,680)">
      <rect x="-1" y="-70" width="2" height="70"/>
      <line x1="-12" y1="-60" x2="12" y2="-60" stroke="#0a0604" stroke-width="2"/>
      <line x1="-10" y1="-55" x2="10" y2="-55" stroke="#0a0604" stroke-width="1.5"/>
      <line x1="-15" y1="-40" x2="15" y2="-40" stroke="#0a0604" stroke-width="2"/>
    </g>
    <g transform="translate(1200,680)">
      <rect x="-1" y="-65" width="2" height="65"/>
      <line x1="-11" y1="-56" x2="11" y2="-56" stroke="#0a0604" stroke-width="2"/>
      <line x1="-14" y1="-36" x2="14" y2="-36" stroke="#0a0604" stroke-width="2"/>
    </g>
  </g>

  <!-- Label pill -->
  <g transform="translate(60,820)">
    <rect x="0" y="0" width="340" height="42" rx="21" fill="rgba(6,26,14,0.85)" stroke="#F2C354" stroke-width="1.5"/>
    <circle cx="24" cy="21" r="6" fill="#F2C354"/>
    <text x="42" y="27" font-family="Georgia, serif" font-size="15" fill="#F2C354" font-weight="700" letter-spacing="0.06em">DOBA — +35% DE RÉCUPÉRATION</text>
  </g>

  <!-- Vignette -->
  <radialGradient id="vignD" cx="0.5" cy="0.5" r="0.85">
    <stop offset="0.5" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignD)"/>
</svg>
