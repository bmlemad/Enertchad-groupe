<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="General case study - Before and after">
  <defs>
    <linearGradient id="grad_case3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_case3" width="45" height="45" patternUnits="userSpaceOnUse">
      <circle cx="22.5" cy="22.5" r="1.2" fill="#C8962E" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_case3)"/>
  <rect width="800" height="450" fill="url(#dots_case3)"/>
  
  <!-- Before state left -->
  <g transform="translate(80, 100)">
    <!-- Status box -->
    <rect x="0" y="0" width="200" height="200" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Lower performance indicators -->
    <g opacity="0.7">
      <rect x="20" y="30" width="160" height="12" fill="none" stroke="#C8962E" stroke-width="1.5"/>
      <rect x="20" y="30" width="48" height="12" fill="#C8962E" opacity="0.4"/>
      <text x="190" y="39" font-family="monospace" font-size="9" fill="#C8962E">40%</text>
      
      <rect x="20" y="55" width="160" height="12" fill="none" stroke="#2E86DE" stroke-width="1.5"/>
      <rect x="20" y="55" width="56" height="12" fill="#2E86DE" opacity="0.4"/>
      <text x="190" y="64" font-family="monospace" font-size="9" fill="#2E86DE">35%</text>
      
      <rect x="20" y="80" width="160" height="12" fill="none" stroke="#C8962E" stroke-width="1.5"/>
      <rect x="20" y="80" width="40" height="12" fill="#C8962E" opacity="0.4"/>
      <text x="190" y="89" font-family="monospace" font-size="9" fill="#C8962E">25%</text>
    </g>
    
    <!-- Before label -->
    <text x="100" y="140" font-family="Georgia, serif" font-size="14" fill="#C8962E" text-anchor="middle" opacity="0.8" font-weight="bold">BEFORE</text>
    
    <!-- Issues listed -->
    <text x="20" y="160" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">• Low efficiency</text>
    <text x="20" y="175" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">• High downtime</text>
    <text x="20" y="190" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">• Maintenance issues</text>
  </g>
  
  <!-- Improvement arrow center -->
  <g transform="translate(340, 190)">
    <defs>
      <marker id="arrow_case3" markerWidth="15" markerHeight="15" refX="7" refY="7" orient="auto">
        <polygon points="0 0, 15 7, 0 14" fill="#28A745"/>
      </marker>
    </defs>
    <path d="M 0 0 L 90 0" stroke="#28A745" stroke-width="4" fill="none" marker-end="url(#arrow_case3)" opacity="0.85"/>
    <text x="45" y="25" font-family="monospace" font-size="12" fill="#28A745" text-anchor="middle" opacity="0.85" font-weight="bold">IMPROVEMENT</text>
  </g>
  
  <!-- After state right -->
  <g transform="translate(480, 100)">
    <!-- Status box -->
    <rect x="0" y="0" width="200" height="200" fill="none" stroke="#28A745" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Higher performance indicators -->
    <g opacity="0.8">
      <rect x="20" y="30" width="160" height="12" fill="none" stroke="#28A745" stroke-width="1.5"/>
      <rect x="20" y="30" width="144" height="12" fill="#28A745" opacity="0.5"/>
      <text x="190" y="39" font-family="monospace" font-size="9" fill="#28A745">90%</text>
      
      <rect x="20" y="55" width="160" height="12" fill="none" stroke="#2E86DE" stroke-width="1.5"/>
      <rect x="20" y="55" width="136" height="12" fill="#2E86DE" opacity="0.5"/>
      <text x="190" y="64" font-family="monospace" font-size="9" fill="#2E86DE">85%</text>
      
      <rect x="20" y="80" width="160" height="12" fill="none" stroke="#28A745" stroke-width="1.5"/>
      <rect x="20" y="80" width="152" height="12" fill="#28A745" opacity="0.5"/>
      <text x="190" y="89" font-family="monospace" font-size="9" fill="#28A745">95%</text>
    </g>
    
    <!-- After label -->
    <text x="100" y="140" font-family="Georgia, serif" font-size="14" fill="#28A745" text-anchor="middle" opacity="0.85" font-weight="bold">AFTER</text>
    
    <!-- Results -->
    <text x="20" y="160" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">✓ Optimized operations</text>
    <text x="20" y="175" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">✓ 24/7 uptime</text>
    <text x="20" y="190" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.6">✓ Predictive maintenance</text>
  </g>
  
  <!-- Results summary bottom -->
  <g transform="translate(200, 330)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#28A745" opacity="0.85" font-weight="bold">ROI: +250% | Efficiency Gain: +150% | Downtime Reduction: 85%</text>
  </g>
</svg>
