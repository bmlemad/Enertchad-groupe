<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Article actualité 2 - Press release">
  <defs>
    <linearGradient id="grad_news2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_news2" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1.5" fill="#2E86DE" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_news2)"/>
  <rect width="800" height="450" fill="url(#dots_news2)"/>
  
  <!-- Press release document -->
  <g transform="translate(80, 50)">
    <!-- Document header -->
    <rect x="0" y="0" width="600" height="45" fill="none" stroke="#2E86DE" stroke-width="2.5" opacity="0.85"/>
    <text x="300" y="18" font-family="Georgia, serif" font-size="18" fill="#2E86DE" text-anchor="middle" opacity="0.85" font-weight="bold">PRESS RELEASE</text>
    <line x1="50" y1="25" x2="550" y2="25" stroke="#C8962E" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Title section -->
    <rect x="0" y="50" width="600" height="50" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <text x="20" y="75" font-family="Georgia, serif" font-size="13" fill="#C8962E" opacity="0.85" font-weight="bold">FOR IMMEDIATE RELEASE</text>
    <text x="20" y="90" font-family="Georgia, serif" font-size="11" fill="#2E86DE" opacity="0.75">EnerTchad Announces Strategic Partnership with International Operators</text>
    
    <!-- Date and location -->
    <text x="20" y="115" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.7">N'Djamena, Chad - April 15, 2026</text>
    
    <!-- Body content -->
    <g opacity="0.7">
      <line x1="20" y1="130" x2="580" y2="130" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="145" x2="580" y2="145" stroke="#C8962E" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="160" x2="580" y2="160" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="175" x2="580" y2="175" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="190" x2="580" y2="190" stroke="#C8962E" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="205" x2="560" y2="205" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="220" x2="570" y2="220" stroke="#2E86DE" stroke-width="0.8" opacity="0.4"/>
      <line x1="20" y1="235" x2="550" y2="235" stroke="#C8962E" stroke-width="0.8" opacity="0.4"/>
    </g>
    
    <!-- Contact section -->
    <rect x="20" y="250" width="560" height="40" fill="none" stroke="#2E86DE" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
    <text x="30" y="267" font-family="monospace" font-size="9" fill="#C8962E" opacity="0.7">Media Contact: communications@enertchad.td | +235 66 12 34 56</text>
    <text x="30" y="282" font-family="monospace" font-size="9" fill="#2E86DE" opacity="0.7">###</text>
  </g>
</svg>
