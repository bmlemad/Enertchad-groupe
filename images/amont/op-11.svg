<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Environnement et remédiation - Tree and water cycle">
  <defs>
    <linearGradient id="grad_op11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2240;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid_op11" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#28A745" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op11)"/>
  <rect width="800" height="450" fill="url(#grid_op11)"/>
  
  <!-- Tree/leaf left side -->
  <g transform="translate(120, 100)">
    <!-- Trunk -->
    <rect x="35" y="80" width="30" height="80" fill="none" stroke="#C8962E" stroke-width="2.5" opacity="0.8"/>
    <!-- Roots -->
    <path d="M 40 160 L 30 180 M 50 160 L 50 180 M 60 160 L 70 180" stroke="#28A745" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <!-- Canopy leaves -->
    <path d="M 50 50 Q 20 40 10 70 Q 20 90 50 100 Q 80 90 90 70 Q 80 40 50 50" fill="none" stroke="#28A745" stroke-width="2.5" opacity="0.85"/>
    <path d="M 50 35 Q 35 20 20 35 Q 35 50 50 50 Q 65 50 80 35 Q 65 20 50 35" fill="none" stroke="#28A745" stroke-width="2.5" opacity="0.85"/>
    <!-- Center vein -->
    <line x1="50" y1="30" x2="50" y2="95" stroke="#28A745" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Water cycle center -->
  <g transform="translate(340, 100)">
    <!-- Water body -->
    <ellipse cx="40" cy="120" rx="60" ry="25" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.7"/>
    
    <!-- Evaporation arrows -->
    <defs>
      <marker id="arrow_op11" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#C8962E"/>
      </marker>
    </defs>
    <path d="M 20 110 L 20 60" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_op11)" opacity="0.7"/>
    <path d="M 40 110 L 40 50" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_op11)" opacity="0.7"/>
    <path d="M 60 110 L 60 60" stroke="#C8962E" stroke-width="2" fill="none" marker-end="url(#arrow_op11)" opacity="0.7"/>
    
    <!-- Cloud -->
    <path d="M 15 30 Q 15 10 35 10 Q 55 10 55 30 Q 65 30 65 45 Q 45 50 25 50 Q 15 50 15 40 Z" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.6"/>
    
    <!-- Precipitation -->
    <line x1="25" y1="50" x2="20" y2="90" stroke="#2E86DE" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
    <line x1="45" y1="50" x2="40" y2="90" stroke="#2E86DE" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Remediation pattern right side -->
  <g transform="translate(580, 120)">
    <!-- Soil layers -->
    <g opacity="0.7">
      <rect x="0" y="0" width="100" height="25" fill="none" stroke="#C8962E" stroke-width="2"/>
      <rect x="0" y="30" width="100" height="25" fill="none" stroke="#2E86DE" stroke-width="2"/>
      <rect x="0" y="60" width="100" height="25" fill="none" stroke="#C8962E" stroke-width="2"/>
    </g>
    
    <!-- Remediation arrows (cleanup) -->
    <defs>
      <marker id="cleanup" markerWidth="8" markerHeight="8" refX="4" refY="2" orient="auto">
        <polygon points="0 0, 8 2, 0 4" fill="#28A745"/>
      </marker>
    </defs>
    <path d="M -30 12 L -5 12" stroke="#28A745" stroke-width="2" fill="none" marker-end="url(#cleanup)" opacity="0.8"/>
    <path d="M -30 42 L -5 42" stroke="#28A745" stroke-width="2" fill="none" marker-end="url(#cleanup)" opacity="0.8"/>
    <path d="M -30 72 L -5 72" stroke="#28A745" stroke-width="2" fill="none" marker-end="url(#cleanup)" opacity="0.8"/>
    
    <!-- Treatment circles -->
    <circle cx="115" cy="12" r="5" fill="none" stroke="#28A745" stroke-width="1.5" opacity="0.6"/>
    <circle cx="115" cy="42" r="5" fill="none" stroke="#28A745" stroke-width="1.5" opacity="0.6"/>
    <circle cx="115" cy="72" r="5" fill="none" stroke="#28A745" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
