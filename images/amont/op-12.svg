<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Approvisionnement et import - Container and cargo">
  <defs>
    <linearGradient id="grad_op12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots_op12" width="45" height="45" patternUnits="userSpaceOnUse">
      <circle cx="22.5" cy="22.5" r="1.2" fill="#2E86DE" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grad_op12)"/>
  <rect width="800" height="450" fill="url(#dots_op12)"/>
  
  <!-- Shipping containers left -->
  <g transform="translate(80, 100)">
    <!-- Container 1 -->
    <rect x="0" y="0" width="45" height="35" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="12" x2="45" y2="12" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="24" x2="45" y2="24" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="22.5" y="33" font-family="monospace" font-size="9" fill="#C8962E" text-anchor="middle" opacity="0.6">CARGO</text>
    
    <!-- Container 2 (stacked) -->
    <rect x="0" y="40" width="45" height="35" fill="none" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="52" x2="45" y2="52" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="64" x2="45" y2="64" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <text x="22.5" y="73" font-family="monospace" font-size="9" fill="#2E86DE" text-anchor="middle" opacity="0.6">CARGO</text>
    
    <!-- Container 3 (stacked) -->
    <rect x="0" y="80" width="45" height="35" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="92" x2="45" y2="92" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="104" x2="45" y2="104" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Supply flow arrows center -->
  <defs>
    <marker id="arrow_op12" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8962E"/>
    </marker>
  </defs>
  <g transform="translate(220, 140)">
    <!-- Flow 1 -->
    <path d="M 0 0 Q 50 -30 100 0" stroke="#C8962E" stroke-width="2.5" fill="none" marker-end="url(#arrow_op12)" opacity="0.7" stroke-linecap="round"/>
    <!-- Flow 2 -->
    <path d="M 0 40 Q 50 40 100 40" stroke="#2E86DE" stroke-width="2.5" fill="none" marker-end="url(#arrow_op12)" opacity="0.7" stroke-linecap="round"/>
    <!-- Flow 3 -->
    <path d="M 0 80 Q 50 110 100 80" stroke="#C8962E" stroke-width="2.5" fill="none" marker-end="url(#arrow_op12)" opacity="0.7" stroke-linecap="round"/>
  </g>
  
  <!-- Customs/import gateway right -->
  <g transform="translate(530, 120)">
    <!-- Gateway structure -->
    <line x1="0" y1="0" x2="0" y2="100" stroke="#2E86DE" stroke-width="3" opacity="0.8"/>
    <line x1="100" y1="0" x2="100" y2="100" stroke="#2E86DE" stroke-width="3" opacity="0.8"/>
    <line x1="0" y1="0" x2="100" y2="0" stroke="#2E86DE" stroke-width="3" opacity="0.8"/>
    
    <!-- Checkpoint boxes -->
    <rect x="15" y="20" width="25" height="20" fill="none" stroke="#C8962E" stroke-width="1.5" opacity="0.7"/>
    <circle cx="27.5" cy="30" r="2" fill="#C8962E" opacity="0.7"/>
    
    <rect x="60" y="20" width="25" height="20" fill="none" stroke="#2E86DE" stroke-width="1.5" opacity="0.7"/>
    <circle cx="72.5" cy="30" r="2" fill="#2E86DE" opacity="0.7"/>
    
    <!-- Stamp -->
    <rect x="20" y="60" width="35" height="20" fill="none" stroke="#C8962E" stroke-width="2" opacity="0.7" transform="rotate(-15 37.5 70)"/>
    <text x="37.5" y="72" font-family="monospace" font-size="10" fill="#C8962E" text-anchor="middle" opacity="0.7" transform="rotate(-15 37.5 70)" font-weight="bold">OK</text>
  </g>
  
  <!-- Import checklist bottom -->
  <g transform="translate(100, 320)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#C8962E" opacity="0.7">Import Process:</text>
    <circle cx="8" cy="18" r="2.5" fill="#C8962E" opacity="0.7"/>
    <line x1="15" y1="18" x2="50" y2="18" stroke="#C8962E" stroke-width="1" opacity="0.5"/>
    <text x="55" y="22" font-family="monospace" font-size="10" fill="#2E86DE" opacity="0.6">Registration</text>
    
    <circle cx="8" cy="40" r="2.5" fill="#2E86DE" opacity="0.7"/>
    <line x1="15" y1="40" x2="50" y2="40" stroke="#2E86DE" stroke-width="1" opacity="0.5"/>
    <text x="55" y="44" font-family="monospace" font-size="10" fill="#C8962E" opacity="0.6">Inspection</text>
  </g>
</svg>
