<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#080E1A"/>

  <!-- Gas Station Canopy -->
  <g class="pulse">
    <!-- Roof structure -->
    <polygon points="40,50 160,50 155,60 45,60" fill="rgba(217, 119, 6, 0.15)" stroke="#D97706" stroke-width="2" opacity="0.9"/>

    <!-- Support columns -->
    <rect x="50" y="60" width="6" height="45" fill="#D97706" opacity="0.7"/>
    <rect x="144" y="60" width="6" height="45" fill="#D97706" opacity="0.7"/>

    <!-- Roof details -->
    <line x1="40" y1="50" x2="160" y2="50" stroke="#D97706" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="55" x2="155" y2="55" stroke="#D97706" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Fuel Pumps -->
  <!-- Pump 1 -->
  <g opacity="0.8">
    <!-- Pump body -->
    <rect x="55" y="75" width="12" height="28" fill="rgba(217, 119, 6, 0.2)" stroke="#D97706" stroke-width="1.5" rx="2"/>

    <!-- Screen/display area -->
    <rect x="58" y="78" width="6" height="8" fill="rgba(217, 119, 6, 0.3)" opacity="0.6"/>

    <!-- Nozzle -->
    <polygon points="61,103 65,103 64,110 58,110" fill="#D97706" opacity="0.7"/>

    <!-- Hose hint -->
    <path d="M 64 110 Q 70 115 75 120" fill="none" stroke="#D97706" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Pump 2 -->
  <g opacity="0.7">
    <!-- Pump body -->
    <rect x="133" y="78" width="12" height="28" fill="rgba(217, 119, 6, 0.2)" stroke="#D97706" stroke-width="1.5" rx="2"/>

    <!-- Screen/display area -->
    <rect x="136" y="81" width="6" height="8" fill="rgba(217, 119, 6, 0.3)" opacity="0.6"/>

    <!-- Nozzle -->
    <polygon points="139,106 143,106 142,113 136,113" fill="#D97706" opacity="0.7"/>

    <!-- Hose hint -->
    <path d="M 142 113 Q 135 118 130 123" fill="none" stroke="#D97706" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Fuel Drop Icon -->
  <g class="pulse" style="animation-delay: 0.5s">
    <!-- Drop shape -->
    <path d="M 100 20 Q 95 28 95 35 Q 95 42 100 48 Q 105 42 105 35 Q 105 28 100 20 Z"
          fill="#D97706" opacity="0.8" stroke="#D97706" stroke-width="1"/>

    <!-- Inner highlight -->
    <ellipse cx="99" cy="32" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Ground/pavement -->
  <g opacity="0.3">
    <rect x="35" y="105" width="130" height="35" fill="rgba(217, 119, 6, 0.1)" stroke="#D97706" stroke-width="0.5"/>

    <!-- Pavement lines -->
    <line x1="45" y1="115" x2="155" y2="115" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <line x1="45" y1="125" x2="155" y2="125" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Flow/energy indicator -->
  <g opacity="0.5">
    <circle cx="70" cy="85" r="3" fill="#D97706" opacity="0.6"/>
    <circle cx="130" cy="90" r="3" fill="#D97706" opacity="0.6"/>
  </g>
</svg>