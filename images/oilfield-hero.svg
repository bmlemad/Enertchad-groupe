<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Oilfield operations illustration with derrick and pumpjack silhouettes over a desert sunset">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0C1426"/>
      <stop offset="55%" stop-color="#1A2540"/>
      <stop offset="100%" stop-color="#2E86DE" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#080E1A"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.55" r="0.12">
      <stop offset="0%" stop-color="#D9A84F" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D9A84F" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes pump { 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(8deg);} }
      .beam{ transform-origin:260px 270px; animation: pump 3.2s ease-in-out infinite; }
      .beam2{ transform-origin:520px 285px; animation: pump 3.8s ease-in-out infinite reverse; }
    </style>
  </defs>

  <!-- background -->
  <rect width="800" height="400" fill="url(#sky)"/>
  <circle cx="576" cy="220" r="48" fill="url(#sun)"/>

  <!-- distant hills -->
  <path d="M0 300 L120 270 L240 295 L360 260 L520 290 L680 258 L800 285 L800 400 L0 400 Z"
        fill="#0F1A2E" opacity="0.6"/>
  <path d="M0 340 L160 315 L320 335 L480 305 L640 330 L800 315 L800 400 L0 400 Z"
        fill="url(#ground)"/>

  <!-- derrick (left) -->
  <g transform="translate(90,140)">
    <path d="M40 0 L55 0 L70 200 L25 200 Z" fill="none" stroke="#D9A84F" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="0" x2="25" y2="200" stroke="#D9A84F" stroke-width="1.5" opacity="0.5"/>
    <line x1="55" y1="0" x2="70" y2="200" stroke="#D9A84F" stroke-width="1.5" opacity="0.5"/>
    <line x1="35" y1="40" x2="60" y2="40" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="32" y1="80" x2="63" y2="80" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="29" y1="120" x2="66" y2="120" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="27" y1="160" x2="68" y2="160" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- pumpjack 1 -->
  <g transform="translate(220,230)">
    <rect x="15" y="30" width="60" height="10" fill="#1A2540"/>
    <rect x="38" y="0" width="10" height="40" fill="#1A2540"/>
    <g class="beam">
      <rect x="-20" y="-3" width="110" height="6" fill="#D9A84F" opacity="0.85"/>
      <rect x="-28" y="-12" width="18" height="24" fill="#D9A84F"/>
    </g>
  </g>

  <!-- pumpjack 2 (smaller, farther right) -->
  <g transform="translate(480,250)" opacity="0.7">
    <rect x="10" y="22" width="50" height="8" fill="#1A2540"/>
    <rect x="30" y="0" width="8" height="30" fill="#1A2540"/>
    <g class="beam2">
      <rect x="-16" y="-2" width="88" height="5" fill="#0EA5E9" opacity="0.7"/>
      <rect x="-22" y="-10" width="14" height="20" fill="#0EA5E9"/>
    </g>
  </g>

  <!-- storage tanks (right) -->
  <g transform="translate(640,260)">
    <ellipse cx="30" cy="0" rx="30" ry="6" fill="#1A2540"/>
    <rect x="0" y="0" width="60" height="50" fill="#1A2540"/>
    <ellipse cx="30" cy="50" rx="30" ry="6" fill="#0F1A2E"/>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#D9A84F" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#D9A84F" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g transform="translate(715,275)" opacity="0.75">
    <ellipse cx="20" cy="0" rx="20" ry="4" fill="#1A2540"/>
    <rect x="0" y="0" width="40" height="35" fill="#1A2540"/>
    <ellipse cx="20" cy="35" rx="20" ry="4" fill="#0F1A2E"/>
  </g>

  <!-- pipeline line -->
  <path d="M0 355 L800 345" stroke="#D9A84F" stroke-width="2" opacity="0.35"/>

  <!-- particle flecks -->
  <circle cx="120" cy="110" r="1.2" fill="#D9A84F" opacity="0.7"/>
  <circle cx="310" cy="80"  r="1"   fill="#D9A84F" opacity="0.6"/>
  <circle cx="620" cy="140" r="1.4" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="460" cy="100" r="0.9" fill="#D9A84F" opacity="0.4"/>
</svg>
