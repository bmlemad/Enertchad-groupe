<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .float { animation: float 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#080E1A"/>

  <!-- Solar Panel Array -->
  <g class="float">
    <!-- Panel 1 -->
    <rect x="40" y="50" width="35" height="25" fill="rgba(16, 185, 129, 0.15)" stroke="#10B981" stroke-width="1.5" rx="2"/>
    <line x1="44" y1="50" x2="44" y2="75" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="52" y1="50" x2="52" y2="75" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="60" y1="50" x2="60" y2="75" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="68" y1="50" x2="68" y2="75" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>

    <!-- Panel 2 -->
    <rect x="40" y="78" width="35" height="25" fill="rgba(16, 185, 129, 0.12)" stroke="#10B981" stroke-width="1.5" rx="2"/>
    <line x1="44" y1="78" x2="44" y2="103" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="52" y1="78" x2="52" y2="103" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="60" y1="78" x2="60" y2="103" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="68" y1="78" x2="68" y2="103" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Lightning Bolt -->
  <g class="pulse" style="animation-delay: 0.5s">
    <polygon points="100,35 110,60 100,65 115,95 95,70 105,65"
             fill="#10B981" opacity="0.8" stroke="#10B981" stroke-width="1.5" stroke-linejoin="miter"/>

    <!-- Highlight -->
    <line x1="102" y1="40" x2="105" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Green Leaf -->
  <g class="float" style="animation-delay: 0.7s">
    <!-- Leaf outline -->
    <ellipse cx="145" cy="50" rx="18" ry="24" fill="rgba(16, 185, 129, 0.2)" stroke="#10B981" stroke-width="1.5" opacity="0.8"/>

    <!-- Leaf vein -->
    <line x1="145" y1="26" x2="145" y2="74" stroke="#10B981" stroke-width="1" opacity="0.6"/>

    <!-- Sub-veins -->
    <line x1="130" y1="45" x2="145" y2="50" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="160" y1="45" x2="145" y2="50" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="130" y1="60" x2="145" y2="55" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="160" y1="60" x2="145" y2="55" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Connection lines representing energy flow -->
  <g opacity="0.5">
    <!-- Solar to center -->
    <line x1="75" y1="62" x2="100" y2="70" stroke="#10B981" stroke-width="1" opacity="0.5"/>

    <!-- Lightning to center -->
    <line x1="115" y1="70" x2="130" y2="60" stroke="#10B981" stroke-width="1" opacity="0.5"/>

    <!-- Leaf to bottom -->
    <line x1="145" y1="74" x2="140" y2="105" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Energy indicator dots -->
  <g class="pulse">
    <circle cx="100" cy="70" r="2" fill="#10B981" opacity="0.7"/>
    <circle cx="130" cy="60" r="2" fill="#10B981" opacity="0.6"/>
  </g>

  <!-- Renewable symbol circle -->
  <g opacity="0.3">
    <circle cx="100" cy="75" r="40" fill="none" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>
</svg>