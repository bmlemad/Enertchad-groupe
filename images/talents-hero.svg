<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes rise { 0% { transform: translateY(0px); opacity: 0.3; } 50% { opacity: 1; } 100% { transform: translateY(-30px); opacity: 0; } }
      .float { animation: float 3s ease-in-out infinite; }
      .rise { animation: rise 3s ease-in infinite; }
    </style>
    <linearGradient id="person-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86DE;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#080E1A"/>

  <!-- Person 1 - Left, Blue hard hat (Amont) -->
  <g class="float" style="animation-delay: 0s">
    <!-- Hard hat -->
    <circle cx="150" cy="80" r="20" fill="#2E86DE" opacity="0.8" stroke="#2E86DE" stroke-width="1"/>
    <rect x="135" y="95" width="30" height="3" fill="#2E86DE" opacity="0.6"/>

    <!-- Head -->
    <circle cx="150" cy="110" r="16" fill="rgba(46, 134, 222, 0.3)" stroke="#2E86DE" stroke-width="1.5"/>

    <!-- Body -->
    <rect x="140" y="130" width="20" height="35" fill="rgba(46, 134, 222, 0.2)" stroke="#2E86DE" stroke-width="1" rx="3"/>

    <!-- Arms -->
    <line x1="140" y1="140" x2="110" y2="135" stroke="#2E86DE" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="160" y1="140" x2="190" y2="135" stroke="#2E86DE" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="145" y1="165" x2="140" y2="195" stroke="#2E86DE" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="155" y1="165" x2="160" y2="195" stroke="#2E86DE" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Person 2 - Center-Left, Cyan hard hat (Midstream) -->
  <g class="float" style="animation-delay: 0.5s">
    <!-- Hard hat -->
    <circle cx="300" cy="75" r="20" fill="#0EA5E9" opacity="0.8" stroke="#0EA5E9" stroke-width="1"/>
    <rect x="285" y="90" width="30" height="3" fill="#0EA5E9" opacity="0.6"/>

    <!-- Head -->
    <circle cx="300" cy="110" r="16" fill="rgba(14, 165, 233, 0.3)" stroke="#0EA5E9" stroke-width="1.5"/>

    <!-- Body -->
    <rect x="290" y="130" width="20" height="35" fill="rgba(14, 165, 233, 0.2)" stroke="#0EA5E9" stroke-width="1" rx="3"/>

    <!-- Arms -->
    <line x1="290" y1="140" x2="260" y2="130" stroke="#0EA5E9" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="310" y1="140" x2="340" y2="130" stroke="#0EA5E9" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="295" y1="165" x2="290" y2="195" stroke="#0EA5E9" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="305" y1="165" x2="310" y2="195" stroke="#0EA5E9" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Person 3 - Center, Orange hard hat (Aval) -->
  <g class="float" style="animation-delay: 1s">
    <!-- Hard hat -->
    <circle cx="450" cy="70" r="20" fill="#D97706" opacity="0.8" stroke="#D97706" stroke-width="1"/>
    <rect x="435" y="85" width="30" height="3" fill="#D97706" opacity="0.6"/>

    <!-- Head -->
    <circle cx="450" cy="110" r="16" fill="rgba(217, 119, 6, 0.3)" stroke="#D97706" stroke-width="1.5"/>

    <!-- Body -->
    <rect x="440" y="130" width="20" height="35" fill="rgba(217, 119, 6, 0.2)" stroke="#D97706" stroke-width="1" rx="3"/>

    <!-- Arms -->
    <line x1="440" y1="140" x2="410" y2="135" stroke="#D97706" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="460" y1="140" x2="490" y2="135" stroke="#D97706" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="445" y1="165" x2="440" y2="195" stroke="#D97706" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="455" y1="165" x2="460" y2="195" stroke="#D97706" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Person 4 - Center-Right, Purple hard hat (Tech) -->
  <g class="float" style="animation-delay: 1.5s">
    <!-- Hard hat -->
    <circle cx="600" cy="75" r="20" fill="#8B5CF6" opacity="0.8" stroke="#8B5CF6" stroke-width="1"/>
    <rect x="585" y="90" width="30" height="3" fill="#8B5CF6" opacity="0.6"/>

    <!-- Head -->
    <circle cx="600" cy="110" r="16" fill="rgba(139, 92, 246, 0.3)" stroke="#8B5CF6" stroke-width="1.5"/>

    <!-- Body -->
    <rect x="590" y="130" width="20" height="35" fill="rgba(139, 92, 246, 0.2)" stroke="#8B5CF6" stroke-width="1" rx="3"/>

    <!-- Arms -->
    <line x1="590" y1="140" x2="560" y2="130" stroke="#8B5CF6" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="610" y1="140" x2="640" y2="130" stroke="#8B5CF6" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="595" y1="165" x2="590" y2="195" stroke="#8B5CF6" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="605" y1="165" x2="610" y2="195" stroke="#8B5CF6" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Person 5 - Right, Green hard hat (Energy) -->
  <g class="float" style="animation-delay: 2s">
    <!-- Hard hat -->
    <circle cx="750" cy="80" r="20" fill="#10B981" opacity="0.8" stroke="#10B981" stroke-width="1"/>
    <rect x="735" y="95" width="30" height="3" fill="#10B981" opacity="0.6"/>

    <!-- Head -->
    <circle cx="750" cy="110" r="16" fill="rgba(16, 185, 129, 0.3)" stroke="#10B981" stroke-width="1.5"/>

    <!-- Body -->
    <rect x="740" y="130" width="20" height="35" fill="rgba(16, 185, 129, 0.2)" stroke="#10B981" stroke-width="1" rx="3"/>

    <!-- Arms -->
    <line x1="740" y1="140" x2="710" y2="135" stroke="#10B981" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="760" y1="140" x2="790" y2="135" stroke="#10B981" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="745" y1="165" x2="740" y2="195" stroke="#10B981" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="755" y1="165" x2="760" y2="195" stroke="#10B981" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Teamwork connections between people -->
  <g stroke="#D9A84F" stroke-width="1" opacity="0.3">
    <line x1="170" y1="145" x2="280" y2="145"/>
    <line x1="320" y1="140" x2="430" y2="140"/>
    <line x1="470" y1="140" x2="580" y2="145"/>
    <line x1="620" y1="145" x2="730" y2="145"/>
  </g>

  <!-- Rising growth indicators -->
  <g opacity="0.5">
    <!-- Left arrow -->
    <path d="M 100 280 L 120 250 L 130 260" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Center rising line -->
    <polyline points="250,320 300,280 350,250 400,210" fill="none" stroke="#D9A84F" stroke-width="2" opacity="0.7"/>
    <circle cx="250" cy="320" r="3" fill="#D9A84F"/>
    <circle cx="400" cy="210" r="3" fill="#D9A84F"/>

    <!-- Right arrow -->
    <path d="M 670 280 L 690 250 L 700 260" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Growth particles -->
  <g class="rise">
    <circle cx="400" cy="300" r="2" fill="#D9A84F"/>
  </g>
  <g class="rise" style="animation-delay: 1s">
    <circle cx="380" cy="320" r="2" fill="#D9A84F"/>
  </g>
  <g class="rise" style="animation-delay: 2s">
    <circle cx="420" cy="310" r="2" fill="#D9A84F"/>
  </g>

  <!-- Base line -->
  <line x1="50" y1="350" x2="750" y2="350" stroke="#2E86DE" stroke-width="1" opacity="0.3"/>
</svg>