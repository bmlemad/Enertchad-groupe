<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      .float { animation: float 3s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#080E1A"/>

  <!-- Chad Map Outline -->
  <g opacity="0.6">
    <!-- Simplified Chad country shape -->
    <path d="M 350 150 L 420 140 L 450 160 L 460 180 L 450 220 L 420 240 L 380 250 L 340 240 L 320 200 Z"
          fill="rgba(46, 134, 222, 0.1)" stroke="#2E86DE" stroke-width="2"/>

    <!-- Capital indicator -->
    <circle cx="400" cy="190" r="4" fill="#D9A84F" opacity="0.8"/>
  </g>

  <!-- Envelope Icon - Top Left -->
  <g class="float" style="animation-delay: 0s">
    <!-- Envelope body -->
    <rect x="80" y="80" width="100" height="70" fill="rgba(217, 168, 79, 0.15)" stroke="#D9A84F" stroke-width="2" rx="3"/>

    <!-- Flap -->
    <polygon points="80,80 130,120 180,80" fill="none" stroke="#D9A84F" stroke-width="2"/>

    <!-- Back line -->
    <line x1="130" y1="120" x2="130" y2="150" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>

    <!-- Front envelope bottom -->
    <line x1="80" y1="150" x2="180" y2="150" stroke="#D9A84F" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Phone Icon - Top Right -->
  <g class="float" style="animation-delay: 0.8s">
    <!-- Phone body -->
    <rect x="670" y="90" width="50" height="90" fill="rgba(14, 165, 233, 0.15)" stroke="#0EA5E9" stroke-width="2" rx="6"/>

    <!-- Screen -->
    <rect x="680" y="105" width="30" height="50" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" stroke-width="1" rx="2"/>

    <!-- Screen content -->
    <line x1="685" y1="115" x2="705" y2="115" stroke="#0EA5E9" stroke-width="0.5" opacity="0.5"/>
    <line x1="685" y1="125" x2="705" y2="125" stroke="#0EA5E9" stroke-width="0.5" opacity="0.5"/>
    <line x1="685" y1="135" x2="705" y2="135" stroke="#0EA5E9" stroke-width="0.5" opacity="0.4"/>

    <!-- Button -->
    <circle cx="695" cy="170" r="3" fill="#0EA5E9" opacity="0.6"/>
  </g>

  <!-- Map Pin - Center -->
  <g class="pulse">
    <!-- Pin body -->
    <circle cx="400" cy="120" r="18" fill="#D9A84F" opacity="0.7" stroke="#D9A84F" stroke-width="1.5"/>

    <!-- Pin point -->
    <polygon points="400,138 395,128 405,128" fill="#D9A84F" opacity="0.7"/>

    <!-- Inner circle -->
    <circle cx="400" cy="120" r="10" fill="rgba(217, 168, 79, 0.3)" stroke="#D9A84F" stroke-width="1" opacity="0.6"/>

    <!-- Center dot -->
    <circle cx="400" cy="120" r="4" fill="#080E1A" opacity="0.8"/>
  </g>

  <!-- Chat Bubbles -->
  <g>
    <!-- Left bubble -->
    <g class="float" style="animation-delay: 0.3s">
      <rect x="150" y="240" width="100" height="60" fill="rgba(46, 134, 222, 0.15)" stroke="#2E86DE" stroke-width="1.5" rx="8"/>
      <polygon points="145,290 150,300 160,290" fill="rgba(46, 134, 222, 0.15)"/>

      <!-- Text lines -->
      <line x1="165" y1="255" x2="235" y2="255" stroke="#2E86DE" stroke-width="0.5" opacity="0.5"/>
      <line x1="165" y1="268" x2="235" y2="268" stroke="#2E86DE" stroke-width="0.5" opacity="0.4"/>
      <line x1="165" y1="281" x2="220" y2="281" stroke="#2E86DE" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Right bubble -->
    <g class="float" style="animation-delay: 1.2s">
      <rect x="550" y="240" width="100" height="60" fill="rgba(14, 165, 233, 0.15)" stroke="#0EA5E9" stroke-width="1.5" rx="8"/>
      <polygon points="655,290 660,300 650,290" fill="rgba(14, 165, 233, 0.15)"/>

      <!-- Text lines -->
      <line x1="565" y1="255" x2="635" y2="255" stroke="#0EA5E9" stroke-width="0.5" opacity="0.5"/>
      <line x1="565" y1="268" x2="635" y2="268" stroke="#0EA5E9" stroke-width="0.5" opacity="0.4"/>
      <line x1="565" y1="281" x2="610" y2="281" stroke="#0EA5E9" stroke-width="0.5" opacity="0.4"/>
    </g>
  </g>

  <!-- Connection Lines - Network effect -->
  <g stroke="#D9A84F" stroke-width="1" opacity="0.3">
    <!-- Envelope to center -->
    <line x1="180" y1="115" x2="382" y2="140"/>

    <!-- Phone to center -->
    <line x1="670" y1="130" x2="418" y2="140"/>

    <!-- Map pin to bubbles -->
    <line x1="400" y1="155" x2="250" y2="240"/>
    <line x1="400" y1="155" x2="600" y2="240"/>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.5">
    <circle cx="180" cy="115" r="2.5" fill="#D9A84F"/>
    <circle cx="670" cy="130" r="2.5" fill="#0EA5E9"/>
    <circle cx="250" cy="240" r="2" fill="#2E86DE"/>
    <circle cx="600" cy="240" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Email symbol alternate -->
  <g class="float" style="animation-delay: 1.5s">
    <!-- Letter icon -->
    <rect x="320" y="330" width="60" height="50" fill="rgba(217, 168, 79, 0.1)" stroke="#D9A84F" stroke-width="1.5" rx="2"/>
    <line x1="320" y1="335" x2="350" y2="355" stroke="#D9A84F" stroke-width="1" opacity="0.6"/>
    <line x1="380" y1="335" x2="350" y2="355" stroke="#D9A84F" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Phone symbol alternate -->
  <g class="float" style="animation-delay: 2s">
    <!-- Phone handset icon -->
    <path d="M 420 330 Q 420 350 435 360 Q 450 340 450 330" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <circle cx="425" cy="328" r="3" fill="#0EA5E9" opacity="0.6"/>
    <circle cx="445" cy="328" r="3" fill="#0EA5E9" opacity="0.6"/>
  </g>

  <!-- Message indicator -->
  <g class="pulse" style="animation-delay: 0.5s">
    <rect x="500" y="340" width="50" height="35" fill="none" stroke="#2E86DE" stroke-width="1.5" rx="4"/>
    <line x1="510" y1="350" x2="540" y2="350" stroke="#2E86DE" stroke-width="0.5" opacity="0.5"/>
    <line x1="510" y1="360" x2="540" y2="360" stroke="#2E86DE" stroke-width="0.5" opacity="0.4"/>
    <line x1="510" y1="370" x2="530" y2="370" stroke="#2E86DE" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>