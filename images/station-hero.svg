<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D9A84F;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D9A84F;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="dropGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0.3" />
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="#080E1A"/>

  <rect x="0" y="400" width="800" height="200" fill="url(#goldAccent)"/>

  <g opacity="0.15">
    <line x1="0" y1="420" x2="800" y2="420" stroke="#D9A84F" stroke-width="2"/>
    <line x1="0" y1="440" x2="800" y2="440" stroke="#D9A84F" stroke-width="1.5"/>
    <line x1="0" y1="460" x2="800" y2="460" stroke="#D9A84F" stroke-width="1"/>
  </g>

  <g filter="url(#softGlow)">
    <rect x="300" y="150" width="200" height="280" fill="url(#amberGradient)" rx="15"/>

    <rect x="340" y="200" width="50" height="120" fill="#D97706" opacity="0.7" rx="8"/>
    <rect x="410" y="200" width="50" height="120" fill="#D97706" opacity="0.7" rx="8"/>

    <circle cx="320" cy="380" r="25" fill="#D97706" opacity="0.8"/>
    <circle cx="480" cy="380" r="25" fill="#D97706" opacity="0.8"/>

    <path d="M 400 380 L 400 420 Q 400 440 420 450" fill="none" stroke="#D97706" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <path d="M 400 380 L 400 420 Q 400 440 380 450" fill="none" stroke="#D97706" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g filter="url(#softGlow)">
    <ellipse cx="280" cy="280" rx="18" ry="28" fill="url(#dropGlow)"/>
    <ellipse cx="520" cy="300" rx="16" ry="26" fill="url(#dropGlow)" opacity="0.7"/>
    <ellipse cx="300" cy="320" rx="15" ry="24" fill="url(#dropGlow)" opacity="0.6"/>
    <ellipse cx="500" cy="260" rx="14" ry="22" fill="url(#dropGlow)" opacity="0.5"/>
  </g>

  <g opacity="0.4">
    <path d="M 250 450 L 280 460" stroke="#D9A84F" stroke-width="2" stroke-linecap="round"/>
    <path d="M 520 450 L 550 460" stroke="#D9A84F" stroke-width="2" stroke-linecap="round"/>
    <path d="M 320 480 L 350 490" stroke="#D9A84F" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 450 480 L 480 490" stroke="#D9A84F" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g opacity="0.3">
    <circle cx="150" cy="500" r="3" fill="#D9A84F"/>
    <circle cx="650" cy="480" r="3" fill="#D9A84F"/>
    <circle cx="100" cy="520" r="2" fill="#D9A84F"/>
    <circle cx="700" cy="510" r="2" fill="#D9A84F"/>
  </g>
</svg>