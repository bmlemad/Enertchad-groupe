<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      .float { animation: float 4s ease-in-out infinite; }
    </style>
    <linearGradient id="building-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86DE;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="light-glow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#D9A84F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#D9A84F;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#080E1A"/>

  <!-- Building Left - Main structure -->
  <g>
    <!-- Main tower -->
    <rect x="100" y="120" width="120" height="220" fill="url(#building-grad)" stroke="#2E86DE" stroke-width="2" opacity="0.9"/>

    <!-- Window grid -->
    <g stroke="#D9A84F" stroke-width="1" opacity="0.4">
      <line x1="110" y1="120" x2="110" y2="340" />
      <line x1="120" y1="120" x2="120" y2="340" />
      <line x1="130" y1="120" x2="130" y2="340" />
      <line x1="140" y1="120" x2="140" y2="340" />
      <line x1="150" y1="120" x2="150" y2="340" />
      <line x1="160" y1="120" x2="160" y2="340" />
      <line x1="170" y1="120" x2="170" y2="340" />
      <line x1="180" y1="120" x2="180" y2="340" />
      <line x1="190" y1="120" x2="190" y2="340" />
      <line x1="200" y1="120" x2="200" y2="340" />
      <line x1="210" y1="120" x2="210" y2="340" />

      <line x1="100" y1="140" x2="220" y2="140" />
      <line x1="100" y1="160" x2="220" y2="160" />
      <line x1="100" y1="180" x2="220" y2="180" />
      <line x1="100" y1="200" x2="220" y2="200" />
      <line x1="100" y1="220" x2="220" y2="220" />
      <line x1="100" y1="240" x2="220" y2="240" />
      <line x1="100" y1="260" x2="220" y2="260" />
      <line x1="100" y1="280" x2="220" y2="280" />
      <line x1="100" y1="300" x2="220" y2="300" />
      <line x1="100" y1="320" x2="220" y2="320" />
    </g>

    <!-- Lit windows -->
    <g fill="#D9A84F" opacity="0.6">
      <rect x="110" y="130" width="8" height="8" />
      <rect x="130" y="130" width="8" height="8" />
      <rect x="160" y="150" width="8" height="8" />
      <rect x="190" y="150" width="8" height="8" />
      <rect x="115" y="170" width="8" height="8" />
      <rect x="145" y="190" width="8" height="8" />
      <rect x="175" y="210" width="8" height="8" />
      <rect x="140" y="240" width="8" height="8" />
      <rect x="170" y="270" width="8" height="8" />
    </g>
  </g>

  <!-- Building Right - Modern structure -->
  <g class="float" style="animation-delay: 1s">
    <rect x="380" y="100" width="140" height="240" fill="rgba(46, 134, 222, 0.15)" stroke="#2E86DE" stroke-width="2" opacity="0.8"/>

    <!-- Glass facade effect -->
    <g stroke="#0EA5E9" stroke-width="1" opacity="0.3">
      <line x1="395" y1="100" x2="395" y2="340" />
      <line x1="415" y1="100" x2="415" y2="340" />
      <line x1="435" y1="100" x2="435" y2="340" />
      <line x1="455" y1="100" x2="455" y2="340" />
      <line x1="475" y1="100" x2="475" y2="340" />
      <line x1="495" y1="100" x2="495" y2="340" />
      <line x1="515" y1="100" x2="515" y2="340" />

      <line x1="380" y1="130" x2="520" y2="130" />
      <line x1="380" y1="160" x2="520" y2="160" />
      <line x1="380" y1="190" x2="520" y2="190" />
      <line x1="380" y1="220" x2="520" y2="220" />
      <line x1="380" y1="250" x2="520" y2="250" />
      <line x1="380" y1="280" x2="520" y2="280" />
      <line x1="380" y1="310" x2="520" y2="310" />
    </g>

    <!-- Accent glow -->
    <circle cx="450" cy="150" r="40" fill="url(#light-glow)"/>
  </g>

  <!-- Flag Chad - Blue -->
  <g class="float" style="animation-delay: 0.5s">
    <rect x="250" y="80" width="45" height="70" fill="#0EA5E9" opacity="0.85" stroke="#2E86DE" stroke-width="1"/>
    <line x1="275" y1="80" x2="275" y2="150" stroke="#2E86DE" stroke-width="2"/>
  </g>

  <!-- Flag Chad - Gold -->
  <g class="float" style="animation-delay: 0.7s">
    <rect x="295" y="75" width="45" height="70" fill="#D9A84F" opacity="0.85" stroke="#2E86DE" stroke-width="1"/>
    <line x1="320" y1="75" x2="320" y2="145" stroke="#2E86DE" stroke-width="2"/>
  </g>

  <!-- Flag Chad - Red -->
  <g class="float" style="animation-delay: 0.9s">
    <rect x="340" y="80" width="45" height="70" fill="#E11D48" opacity="0.85" stroke="#2E86DE" stroke-width="1"/>
    <line x1="365" y1="80" x2="365" y2="150" stroke="#2E86DE" stroke-width="2"/>
  </g>

  <!-- Skyline foreground elements -->
  <g opacity="0.5">
    <!-- Base platform -->
    <rect x="80" y="340" width="640" height="3" fill="#D9A84F" opacity="0.6"/>
    <line x1="50" y1="343" x2="750" y2="343" stroke="#2E86DE" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Connection lines suggesting network/unity -->
  <g stroke="#0EA5E9" stroke-width="1" opacity="0.3">
    <line x1="220" y1="200" x2="380" y2="200" />
    <line x1="220" y1="250" x2="380" y2="250" />
    <circle cx="220" cy="200" r="3" fill="#0EA5E9" opacity="0.5" />
    <circle cx="380" cy="200" r="3" fill="#0EA5E9" opacity="0.5" />
  </g>
</svg>