<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .rotate { animation: rotate 4s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#080E1A"/>

  <!-- Flask/Beaker Container -->
  <g class="pulse">
    <!-- Flask body -->
    <path d="M 70 45 L 65 75 Q 65 95 80 100 Q 95 95 95 75 L 90 45 Z"
          fill="rgba(225, 29, 72, 0.15)" stroke="#E11D48" stroke-width="2" opacity="0.9"/>

    <!-- Neck -->
    <rect x="76" y="35" width="8" height="10" fill="none" stroke="#E11D48" stroke-width="1.5" opacity="0.8"/>

    <!-- Stopper -->
    <circle cx="80" cy="33" r="3" fill="#E11D48" opacity="0.7"/>

    <!-- Liquid inside -->
    <path d="M 68 85 Q 68 92 80 96 Q 92 92 92 85 Z"
          fill="#E11D48" opacity="0.25"/>

    <!-- Measurement lines -->
    <line x1="63" y1="60" x2="68" y2="60" stroke="#E11D48" stroke-width="0.5" opacity="0.5"/>
    <line x1="63" y1="75" x2="68" y2="75" stroke="#E11D48" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Molecular Structure -->
  <g class="rotate" style="transform-origin: 130px 50px">
    <!-- Central atom -->
    <circle cx="130" cy="50" r="3" fill="#E11D48" opacity="0.8"/>

    <!-- Bonded atoms -->
    <circle cx="115" cy="50" r="2.5" fill="#E11D48" opacity="0.7"/>
    <circle cx="145" cy="50" r="2.5" fill="#E11D48" opacity="0.7"/>
    <circle cx="130" cy="35" r="2.5" fill="#E11D48" opacity="0.7"/>
    <circle cx="130" cy="65" r="2.5" fill="#E11D48" opacity="0.7"/>

    <!-- Bonds -->
    <line x1="118" y1="50" x2="127" y2="50" stroke="#E11D48" stroke-width="1.5" opacity="0.6"/>
    <line x1="133" y1="50" x2="142" y2="50" stroke="#E11D48" stroke-width="1.5" opacity="0.6"/>
    <line x1="130" y1="38" x2="130" y2="47" stroke="#E11D48" stroke-width="1.5" opacity="0.6"/>
    <line x1="130" y1="53" x2="130" y2="62" stroke="#E11D48" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Industrial Factory/Processing Plant -->
  <g opacity="0.7">
    <!-- Main structure -->
    <rect x="100" y="105" width="45" height="30" fill="rgba(225, 29, 72, 0.1)" stroke="#E11D48" stroke-width="1.5" rx="2"/>

    <!-- Smokestacks -->
    <rect x="110" y="90" width="5" height="15" fill="#E11D48" opacity="0.6"/>
    <rect x="125" y="88" width="5" height="17" fill="#E11D48" opacity="0.6"/>
    <rect x="140" y="90" width="5" height="15" fill="#E11D48" opacity="0.6"/>

    <!-- Emission wisps (simplified) -->
    <circle cx="112.5" cy="85" r="3" fill="rgba(225, 29, 72, 0.2)" opacity="0.5"/>
    <circle cx="127.5" cy="80" r="3" fill="rgba(225, 29, 72, 0.2)" opacity="0.5"/>
    <circle cx="142.5" cy="85" r="3" fill="rgba(225, 29, 72, 0.2)" opacity="0.5"/>

    <!-- Windows/details -->
    <circle cx="112" cy="115" r="1.5" fill="rgba(225, 29, 72, 0.3)"/>
    <circle cx="125" cy="115" r="1.5" fill="rgba(225, 29, 72, 0.3)"/>
    <circle cx="138" cy="115" r="1.5" fill="rgba(225, 29, 72, 0.3)"/>
  </g>

  <!-- Connection lines between elements -->
  <g opacity="0.4">
    <line x1="95" y1="70" x2="100" y2="90" stroke="#E11D48" stroke-width="1"/>
    <line x1="145" y1="65" x2="125" y2="90" stroke="#E11D48" stroke-width="1"/>
  </g>

  <!-- Accent glow -->
  <circle cx="100" cy="80" r="20" fill="rgba(225, 29, 72, 0.1)" opacity="0.5"/>
</svg>