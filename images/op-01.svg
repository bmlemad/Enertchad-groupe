<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Oil exploration and production illustration showing derricks and seismic survey across Chad's productive basins">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#132240"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A44"/>
      <stop offset="100%" stop-color="#0D1B2E"/>
    </linearGradient>
    <linearGradient id="derrickGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9A84F"/>
      <stop offset="80%" stop-color="#B8892F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  <!-- Ground -->
  <rect y="360" width="800" height="140" fill="url(#groundGrad)"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#2E86DE" stroke-width="1" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="120" cy="60" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="300" cy="40" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="520" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="680" cy="50" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="200" cy="100" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="600" cy="30" r="1.5" fill="#fff" opacity="0.4"/>

  <!-- Derrick 1 (main, center) -->
  <g transform="translate(380, 100)">
    <!-- Derrick tower -->
    <polygon points="0,-10 -40,260 40,260" fill="none" stroke="url(#derrickGrad)" stroke-width="3"/>
    <line x1="-12" y1="50" x2="12" y2="50" stroke="#D9A84F" stroke-width="2" opacity="0.7"/>
    <line x1="-20" y1="100" x2="20" y2="100" stroke="#D9A84F" stroke-width="2" opacity="0.7"/>
    <line x1="-28" y1="150" x2="28" y2="150" stroke="#D9A84F" stroke-width="2" opacity="0.7"/>
    <line x1="-34" y1="200" x2="34" y2="200" stroke="#D9A84F" stroke-width="2" opacity="0.7"/>
    <!-- Cross braces -->
    <line x1="-12" y1="50" x2="20" y2="100" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="50" x2="-20" y2="100" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="-20" y1="100" x2="28" y2="150" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="100" x2="-28" y2="150" stroke="#D9A84F" stroke-width="1" opacity="0.4"/>
    <!-- Top light -->
    <circle cx="0" cy="-10" r="4" fill="#D9A84F" filter="url(#glow)" opacity="0.9"/>
    <!-- Base platform -->
    <rect x="-50" y="255" width="100" height="12" rx="2" fill="#1E3A5F" stroke="#2E86DE" stroke-width="1"/>
  </g>

  <!-- Derrick 2 (left, smaller) -->
  <g transform="translate(160, 180)" opacity="0.6">
    <polygon points="0,-8 -28,180 28,180" fill="none" stroke="#D9A84F" stroke-width="2"/>
    <line x1="-10" y1="40" x2="10" y2="40" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="80" x2="16" y2="80" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="120" x2="22" y2="120" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-8" r="3" fill="#D9A84F" filter="url(#glow)" opacity="0.8"/>
    <rect x="-35" y="176" width="70" height="8" rx="2" fill="#1E3A5F" stroke="#2E86DE" stroke-width="0.5"/>
  </g>

  <!-- Derrick 3 (right, medium) -->
  <g transform="translate(620, 160)" opacity="0.5">
    <polygon points="0,-8 -32,200 32,200" fill="none" stroke="#D9A84F" stroke-width="2"/>
    <line x1="-12" y1="45" x2="12" y2="45" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <line x1="-18" y1="90" x2="18" y2="90" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <line x1="-25" y1="140" x2="25" y2="140" stroke="#D9A84F" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-8" r="3" fill="#D9A84F" filter="url(#glow)" opacity="0.7"/>
    <rect x="-40" y="196" width="80" height="8" rx="2" fill="#1E3A5F" stroke="#2E86DE" stroke-width="0.5"/>
  </g>

  <!-- Seismic waves in ground -->
  <g opacity="0.25">
    <ellipse cx="380" cy="420" rx="200" ry="30" fill="none" stroke="#2E86DE" stroke-width="1" stroke-dasharray="8,4"/>
    <ellipse cx="380" cy="445" rx="160" ry="20" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="6,4"/>
    <ellipse cx="380" cy="465" rx="120" ry="14" fill="none" stroke="#2E86DE" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Oil reservoir indication -->
  <ellipse cx="380" cy="480" rx="80" ry="10" fill="#D97706" opacity="0.2"/>

  <!-- Connecting pipes on ground -->
  <line x1="200" y1="365" x2="340" y2="365" stroke="#1E3A5F" stroke-width="4"/>
  <line x1="420" y1="365" x2="580" y2="365" stroke="#1E3A5F" stroke-width="4"/>
  <circle cx="200" cy="365" r="5" fill="#2E86DE" opacity="0.5"/>
  <circle cx="580" cy="365" r="5" fill="#2E86DE" opacity="0.5"/>

  <!-- Data overlay text -->
  <text x="40" y="480" font-family="Arial, sans-serif" font-size="11" fill="#2E86DE" opacity="0.5" letter-spacing="2">EXPLORATION &amp; PRODUCTION</text>
</svg>