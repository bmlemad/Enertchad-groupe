<!DOCTYPE html>
<html lang="fr" class="no-js">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Hors ligne | EnerTchad Groupe</title>
  <meta name="theme-color" content="#080E1A"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    :root{--bg:#080E1A;--gold:#D9A84F;--white:#E2E8F0;--text-sec:#94A3B8;--cyan:#0EA5E9;--font-d:'Space Grotesk',system-ui,sans-serif;--font-b:'Inter',system-ui,sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);color:var(--white);font-family:var(--font-b);text-align:center;padding:2rem}
    h1{font-family:var(--font-d);font-size:1.5rem;font-weight:600;margin:1.5rem 0 0.75rem;color:var(--white)}
    p{color:var(--text-sec);max-width:420px;line-height:1.7;margin-bottom:2rem;font-size:0.95rem}
    .actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
    button,a{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:999px;font-size:0.88rem;font-weight:600;text-decoration:none;transition:all 0.35s cubic-bezier(0.22,0.61,0.36,1);cursor:pointer;border:none}
    .btn-primary{background:var(--gold);color:var(--bg)}
    .btn-primary:hover{background:#e8c36a;transform:translateY(-2px);box-shadow:0 8px 30px rgba(217,168,79,0.25)}
    .btn-secondary{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid rgba(255,255,255,0.1)}
    .btn-secondary:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px)}
    .logo{width:140px;margin-bottom:2rem;opacity:0.7}
    .pipeline{margin:2rem 0}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:6px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
    .status{font-size:0.8rem;color:var(--text-sec);margin-top:1.5rem}
  </style>
<link rel="canonical" href="https://enertchad-groupe.vercel.app/offline"/>
</head>
<body>
  <img src="/logo-enertchad.svg" alt="EnerTchad" class="logo" loading="eager" decoding="async"/>
  <svg class="pipeline" width="120" height="80" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Broken pipeline illustration -->
    <rect x="5" y="32" width="45" height="16" rx="8" fill="rgba(14,165,233,0.1)" stroke="#0EA5E9" stroke-width="1.5" opacity="0.5"/>
    <rect x="70" y="32" width="45" height="16" rx="8" fill="rgba(14,165,233,0.1)" stroke="#0EA5E9" stroke-width="1.5" opacity="0.5"/>
    <!-- Break gap with signal waves -->
    <path d="M52 40 L56 36 L60 44 L64 36 L68 40" stroke="#D9A84F" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <!-- Flow dots on left side -->
    <circle r="2" fill="#0EA5E9" opacity="0.5">
      <animateMotion dur="2s" repeatCount="indefinite" path="M10,40 L45,40"/>
      <animate attributeName="opacity" values="0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Signal waves above break -->
    <path d="M55 22 Q60 18 65 22" stroke="#D9A84F" stroke-width="1" fill="none" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M53 16 Q60 10 67 16" stroke="#D9A84F" stroke-width="1" fill="none" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    <!-- Valve handles -->
    <line x1="20" y1="28" x2="20" y2="22" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
    <circle cx="20" cy="20" r="3" stroke="#0EA5E9" stroke-width="1" fill="none" opacity="0.3"/>
    <line x1="100" y1="28" x2="100" y2="22" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
    <circle cx="100" cy="20" r="3" stroke="#0EA5E9" stroke-width="1" fill="none" opacity="0.3"/>
  </svg>
  <h1>Connexion interrompue</h1>
  <p>Le pipeline réseau semble coupé. Vérifiez votre connexion internet puis réessayez — les pages déjà visitées restent accessibles hors ligne.</p>
  <div class="actions">
    <button class="btn-primary" onclick="window.location.reload()"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z"/></svg> Réessayer</button>
    <a href="/" class="btn-secondary">Accueil</a>
  </div>
  <div class="status"><span class="status-dot"></span>En attente de reconnexion…</div>
</body>
</html>
